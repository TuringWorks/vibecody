[package]
name = "vibe-infer"
version.workspace = true
description = "Pure-Rust local inference traits + backends (candle / mistralrs) for VibeCody"
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
async-trait.workspace = true
tracing.workspace = true
anyhow = { workspace = true, optional = true }

# Candle backend — pulled only when the `candle` feature is enabled so default
# workspace builds stay fast (no ML toolchain needed).
candle-core = { version = "0.10", optional = true }
candle-nn = { version = "0.10", optional = true }
candle-transformers = { version = "0.10", optional = true }
tokenizers = { version = "0.22", optional = true, default-features = false, features = ["onig"] }
hf-hub = { version = "0.5", optional = true, default-features = false, features = ["tokio", "rustls-tls"] }
tokio = { workspace = true, optional = true }

# Mistral.rs backend — full LLM inference runtime (PagedAttention, ISQ, LoRA,
# OpenAI-compat types). Pulls candle 0.10.x transitively; unifies with the
# `candle` feature's direct deps. Gated because it's a heavy compile (~2 min
# cold). Enable one of `mistralrs-cuda` / `mistralrs-metal` for GPU inference.
#
# Pinned to the TuringWorks fork on branch `vibe/kv-cache-codec-kernels`,
# which extends `vibe/kv-cache-codec` with native CUDA + Metal TurboQuant
# encode kernels (re-exported as `mistralrs::core::turboquant`) on top of
# the `KvCacheCodec` trait + `PassthroughCodec` default on `SingleCache` /
# `RotatingCache`. The hook is opt-in (`codec: None` is bit-exact with
# upstream), so the pin is safe to track on mainline. Bump `rev` when the
# fork advances; we explicitly pin a SHA rather than tracking a branch so
# local, CI, and release builds stay reproducible. Upstream base at time of
# pin: `v0.8.1` (upstream SHA 2d4ba4f1).
mistralrs = { git = "https://github.com/TuringWorks/mistral.rs", rev = "f8f3a105b57636fadade8cd11024772e4f93fd5f", optional = true }
futures = { version = "0.3", optional = true }

[features]
# Default = stub backend only (no ML deps, compiles instantly).
default = []
# Real BERT-style embedding backend (sentence-transformers/all-MiniLM-L6-v2).
# First call downloads the model (~22 MB safetensors) into the hf-hub cache.
candle = [
    "dep:anyhow",
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:tokenizers",
    "dep:hf-hub",
    "dep:tokio",
]
# Apple Metal acceleration for candle — enable on macOS when you want GPU inference.
candle-metal = ["candle", "candle-core?/metal", "candle-nn?/metal", "candle-transformers?/metal"]

# Mistral.rs full-LLM text-generation backend. CPU-only by default; add one of
# the acceleration features below.
#
# `candle-core` is a direct dep here (not just transitive) so the
# `kv_cache_codec` module can use `candle_core::{DType, Device, Tensor,
# bail!}` by name. Mistralrs already pulls the same 0.10.x series, so
# cargo unifies to one build.
mistralrs = [
    "dep:anyhow",
    "dep:candle-core",
    "dep:mistralrs",
    "dep:tokio",
    "dep:futures",
]
mistralrs-cuda = ["mistralrs", "mistralrs?/cuda"]
mistralrs-metal = ["mistralrs", "mistralrs?/metal"]
# Flash-attention v2 (Ampere+). Implies CUDA.
mistralrs-flash-attn = ["mistralrs-cuda", "mistralrs?/flash-attn"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
