# ── CWE-327: Weak Cryptographic Algorithm (Medium) ──────────────────────────
# Reason: ~3,200+ hits across the codebase. These are:
#   - SHA-256 content hashes for file deduplication (not password hashing)
#   - Hex-encoded UUIDs and session IDs
#   - DefaultHasher for HashMap keys (non-cryptographic)
#   - HMAC-SHA256 for webhook signature verification (industry standard)
# None are used for password storage or encryption of sensitive data.
CWE-327:
  status: false_positive
  reason: "SHA-256 content hashes, hex UUIDs, HashMap keys — not used for password/encryption"
  scope: project-wide
  file_count: 100+
  note: |
    The scanner flags any use of hash functions as "weak crypto". In this codebase:
    - SHA-256 is used for content-addressable storage and file checksums
    - Hex encoding is used for session/trace IDs
    - DefaultHasher is Rust's HashMap implementation detail
    - HMAC-SHA256 is used for webhook signatures (GitHub standard)
    None of these require bcrypt/argon2 — they are not password hashing.

