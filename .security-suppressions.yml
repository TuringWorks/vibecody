# Reason: These files DEFINE SAST detection rules containing vulnerable
#         patterns as string literals (e.g. "os.system("). The patterns are
#         never executed — they're regex match targets for scanning user code.
CWE-78:
  status: false_positive
  reason: "SAST rule definitions contain vulnerable patterns as detection signatures, not executable code"
  files:
    - path: vibecli/vibecli-cli/src/bugbot.rs
      lines: [122]
      context: "Regex pattern defining command injection detection rule"
    - path: vibecli/vibecli-cli/src/vulnerability_db.rs
      lines: [1074, 1075, 1077, 2895]
      context: "SAST rule database entries and test cases verifying scanner detects os.system()"

