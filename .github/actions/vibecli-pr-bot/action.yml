name: VibeCLI PR Bot
description: >
  Run a VibeCLI agent task on a PR's context and post the result as a comment.
  Triggered when someone mentions `@vibecli` in a PR comment.

inputs:
  task:
    description: The task description to run (extracted from the PR comment body).
    required: true
  pr_number:
    description: The pull-request number to post the result to.
    required: true
  provider:
    description: AI provider to use (claude, openai, ollama, gemini, grok).
    required: false
    default: claude
  model:
    description: Model override (leave empty to use provider default).
    required: false
    default: ''
  approval_policy:
    description: Tool approval policy (full-auto recommended for CI).
    required: false
    default: full-auto
  workspace:
    description: Path to the workspace root (default is repo root).
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-vibecli-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-vibecli-

    - name: Build VibeCLI
      shell: bash
      run: cargo build --release -p vibecli

    - name: Run VibeCLI agent
      id: agent
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY:    ${{ env.OPENAI_API_KEY }}
        GEMINI_API_KEY:    ${{ env.GEMINI_API_KEY }}
        GROK_API_KEY:      ${{ env.GROK_API_KEY }}
      run: |
        MODEL_FLAG=""
        if [ -n "${{ inputs.model }}" ]; then
          MODEL_FLAG="--model ${{ inputs.model }}"
        fi

        POLICY_FLAG=""
        case "${{ inputs.approval_policy }}" in
          full-auto)  POLICY_FLAG="--full-auto" ;;
          auto-edit)  POLICY_FLAG="--auto-edit" ;;
          suggest)    POLICY_FLAG="--suggest"   ;;
        esac

        ./target/release/vibecli \
          --provider ${{ inputs.provider }} \
          $MODEL_FLAG \
          $POLICY_FLAG \
          --exec "${{ inputs.task }}" \
          --output-format markdown \
          --output /tmp/vibecli-result.md

        echo "result_file=/tmp/vibecli-result.md" >> "$GITHUB_OUTPUT"

    - name: Post result as PR comment
      shell: bash
      env:
        GH_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        RESULT=$(cat /tmp/vibecli-result.md 2>/dev/null || echo "No output produced.")
        gh pr comment ${{ inputs.pr_number }} --body "$(cat <<'COMMENT'
        🤖 **VibeCLI Agent Result**

        ${RESULT}

        ---
        *Generated by [VibeCLI](https://github.com/TuringWorks/vibecody) • triggered by `@vibecli` mention*
        COMMENT
        )"
