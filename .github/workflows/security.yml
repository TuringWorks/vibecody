name: Security

# Runs on every PR + push to main, plus a weekly cron so newly-published CVEs
# against pinned deps are caught even with no code change. See
# docs/security/threat-model.md §7 for the rationale (top-20 ranks #4, #5, #13,
# #14, #15 all live here).

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC — surface new RustSec/npm advisories at the start of the week.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # `security-events: write` needed if/when we upload SARIF to the Code Scanning tab.
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # cargo-audit / cargo-deny need a Cargo.lock; ours is gitignored, so CI generates one.
  CARGO_NET_RETRY: 3

jobs:
  # ─── Rust supply-chain ─────────────────────────────────────────────────────
  cargo-audit:
    name: cargo audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo registry + advisory-db
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/advisory-db
          key: cargo-audit-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-audit-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Generate Cargo.lock (gitignored)
        run: cargo generate-lockfile

      # No `|| true` — this MUST fail the build on any unpatched advisory.
      # Suppressions live in deny.toml [advisories.ignore], with timestamped reasons.
      - name: Run cargo audit
        run: cargo audit --deny warnings

  # ─── Rust policy (licenses, sources, banned crates, duplicates) ────────────
  cargo-deny:
    name: cargo deny (licenses, sources, bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install cargo-deny
        # v2.0.4 → v2.0.18: v2.0.5 added Cargo 1.85 / edition2024 support
        # via tame-index 0.18.0 (release notes). Stuck on v2.0.4 made
        # the job fail on any transitive dep that declared
        # `edition = "2024"` — globset 0.4.18 in this repo, since 2026-04-xx.
        uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2.0.18
        with:
          command: check
          arguments: --all-features

  # ─── Frontend supply-chain (npm) ────────────────────────────────────────────
  npm-audit:
    name: npm audit (${{ matrix.path }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path: [vibeui, vibeapp, packages/agent-sdk]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"

      - name: Skip if no package.json
        id: precheck
        run: |
          if [ -f "${{ matrix.path }}/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json at ${{ matrix.path }} — skipping"
          fi

      # Lockfile is gitignored; generate it for the audit only.
      - name: Generate package-lock.json
        if: steps.precheck.outputs.exists == 'true'
        working-directory: ${{ matrix.path }}
        run: npm install --package-lock-only --ignore-scripts

      - name: Run npm audit
        if: steps.precheck.outputs.exists == 'true'
        working-directory: ${{ matrix.path }}
        run: npm audit --audit-level=high

  # ─── Python supply-chain (vibe-rl-py) ──────────────────────────────────────
  # vibe-rl-py uses uv.lock — outside the npm/cargo coverage above. pip-audit
  # reads the lockfile (via `uv export`) and checks PyPI/OSV advisories.
  pip-audit:
    name: pip-audit (vibe-rl-py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        # TODO: pin to verified SHA during Phase 3 hardening (consistent with
        # the rest of this workflow's pin policy).
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv + pip-audit
        run: pip install --upgrade uv pip-audit

      - name: Export uv.lock → requirements.txt
        working-directory: vibe-rl-py
        # `--no-emit-project` drops the `-e .` editable self-reference (pip-audit
        # can't hash-install a local path). `--no-hashes` sidesteps a uv↔pip
        # hash-format mismatch where uv records sdist hashes that pip's
        # --require-hashes dry-run pass then rejects.
        run: uv export --frozen --no-emit-project --no-hashes --format requirements-txt --output-file /tmp/vibe-rl-py-requirements.txt

      # Each `--ignore-vuln` suppression below MUST cite an audit. Treat the
      # list as a security debt log — review during quarterly threat-model
      # refresh per docs/security/threat-model.md.
      - name: Run pip-audit
        run: |
          # GHSA-69w3-r845-3855 / CVE-2026-1839 (transformers ≤5.0.0rc3):
          #   Vulnerability is in transformers.Trainer._load_rng_state().
          #   vibe-rl-py does not use Trainer (verified by grep across
          #   vibe_rl/algos/*.py; the .train() calls are nn.Module.train()).
          #   Dismissed in Dependabot alert #9. Re-evaluate when upgrading
          #   to transformers 5.x (currently pinned <5.0 in pyproject.toml).
          pip-audit \
            -r /tmp/vibe-rl-py-requirements.txt \
            --ignore-vuln GHSA-69w3-r845-3855

  # ─── Secret scanning ────────────────────────────────────────────────────────
  gitleaks:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so gitleaks can scan past commits, not just the diff.
          # If the repo grows beyond ~5min scan time, switch to `fetch-depth: 1`
          # and rely on protected-branches + pre-commit hook for older history.
          fetch-depth: 0

      # TODO: pin to a verified commit SHA (existing repo convention in release.yml).
      # Tag pin is acceptable for first landing; harden during the Phase 3 review.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ─── SAST: VibeCody-specific patterns + OWASP Top 10 baseline ──────────────
  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    # TODO: pin image to a verified digest during Phase 3 hardening — see release.yml
    # for the SHA-pinning convention this repo follows for actions.
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Three rulesets:
      #   1. OWASP Top 10 baseline (registry)
      #   2. Rust + TypeScript + JavaScript security patterns
      #   3. VibeCody-local rules (added under .semgrep/ in a follow-up PR)
      #
      # `semgrep ci` exits non-zero on findings — that is the gate.
      - name: Run semgrep
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/rust \
            --config p/typescript \
            --config p/javascript \
            --config p/secrets \
            ${{ hashFiles('.semgrep/*.yml') != '' && '--config .semgrep/' || '' }}
        env:
          SEMGREP_RULES_CACHE_DIR: /tmp/semgrep-cache

  # ─── Aggregate gate ─────────────────────────────────────────────────────────
  # A single required check for branch protection — easier than listing every
  # job individually in repo settings.
  security-gate:
    name: Security gate (required)
    runs-on: ubuntu-latest
    needs: [cargo-audit, cargo-deny, npm-audit, pip-audit, gitleaks, semgrep]
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ needs.cargo-audit.result }}"  != "success" ]] || \
             [[ "${{ needs.cargo-deny.result }}"   != "success" ]] || \
             [[ "${{ needs.npm-audit.result }}"    != "success" ]] || \
             [[ "${{ needs.pip-audit.result }}"    != "success" ]] || \
             [[ "${{ needs.gitleaks.result }}"     != "success" ]] || \
             [[ "${{ needs.semgrep.result }}"      != "success" ]]; then
            echo "::error::One or more security checks failed. See individual job logs."
            exit 1
          fi
          echo "All security checks passed."
