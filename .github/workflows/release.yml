name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  # ─── Security audit ───────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit || true

  # ─── VibeCLI binary (5 platforms) ──────────────────────────────────────
  build-cli:
    name: CLI · ${{ matrix.target }}
    needs: audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vibecli
            archive: vibecli-aarch64-apple-darwin.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vibecli
            archive: vibecli-x86_64-apple-darwin.tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: vibecli
            archive: vibecli-x86_64-linux.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: vibecli
            archive: vibecli-aarch64-linux.tar.gz
            use_cross: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vibecli.exe
            archive: vibecli-x86_64-windows.zip

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl, native)
        if: contains(matrix.target, 'musl') && !matrix.use_cross
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools cmake perl

      - name: Install cross (cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build release binary
        run: >
          ${{ matrix.use_cross && 'cross' || 'cargo' }} build
          --release
          --package vibecli
          --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          strip "$BINARY" 2>/dev/null || true
          ls -lh "$BINARY"

      - name: Package (Unix tar.gz)
        if: runner.os != 'Windows'
        run: |
          tar -czf "${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" "${{ matrix.artifact }}"

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          Compress-Archive -Path $src -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ─── VibeUI desktop app (Tauri) ────────────────────────────────────────
  build-vibeui:
    name: VibeUI · ${{ matrix.label }}
    needs: audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS-arm64
            args: --target aarch64-apple-darwin

          - os: macos-latest
            label: macOS-x64
            args: --target x86_64-apple-darwin

          - os: ubuntu-22.04
            label: Linux-x64
            args: ""

          - os: windows-latest
            label: Windows-x64
            args: ""

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.label == 'macOS-arm64' && 'aarch64-apple-darwin' || matrix.label == 'macOS-x64' && 'x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: vibeui
        run: npm install --no-audit --no-fund

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: vibeui-${{ matrix.label }}
          workspaces: vibeui/src-tauri

      - name: Build Tauri app
        working-directory: vibeui
        run: npx tauri build ${{ matrix.args }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find target -name "*.dmg" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.AppImage" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.msi" -exec cp {} dist/ \; 2>/dev/null || true
          find target -path "*/nsis/*.exe" -exec cp {} dist/ \; 2>/dev/null || true
          APP_DIR=$(find target -name "VibeUI.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_DIR" ]; then
            cd "$(dirname "$APP_DIR")" && zip -r "$GITHUB_WORKSPACE/dist/VibeUI-${{ matrix.label }}.app.zip" "VibeUI.app"
          fi
          ls -lhR dist/ || echo "dist/ is empty"
        shell: bash

      - name: Upload VibeUI artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vibeui-${{ matrix.label }}
          path: dist/*

  # ─── VibeCLI desktop app (Tauri) ───────────────────────────────────────
  build-vibeapp:
    name: VibeCLI App · ${{ matrix.label }}
    needs: audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS-arm64
            args: --target aarch64-apple-darwin

          - os: macos-latest
            label: macOS-x64
            args: --target x86_64-apple-darwin

          - os: ubuntu-22.04
            label: Linux-x64
            args: ""

          - os: windows-latest
            label: Windows-x64
            args: ""

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.label == 'macOS-arm64' && 'aarch64-apple-darwin' || matrix.label == 'macOS-x64' && 'x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: vibeapp
        run: npm install --no-audit --no-fund

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: vibeapp-${{ matrix.label }}
          workspaces: vibeapp/src-tauri

      - name: Build Tauri app
        working-directory: vibeapp
        run: npx tauri build ${{ matrix.args }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find target -name "*.dmg" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.AppImage" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.msi" -exec cp {} dist/ \; 2>/dev/null || true
          find target -path "*/nsis/*.exe" -exec cp {} dist/ \; 2>/dev/null || true
          ls -lhR dist/ || echo "dist/ is empty"
        shell: bash

      - name: Upload VibeCLI App artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vibeapp-${{ matrix.label }}
          path: dist/*

  # ─── Docker image ──────────────────────────────────────────────────────
  build-docker:
    name: Docker Image
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build Docker image
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          docker build -t vibecli:${TAG} -t vibecli:latest .
          docker save vibecli:${TAG} | gzip > vibecli-docker-${TAG}.tar.gz
          ls -lh vibecli-docker-*.tar.gz

      - name: Upload Docker artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vibecli-docker
          path: vibecli-docker-*.tar.gz

  # ─── Publish GitHub Release ────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-cli, build-vibeui, build-vibeapp, build-docker]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Compute SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" \) -exec sha256sum {} \; | sed 's|  \./|  |' | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: VibeCody ${{ github.ref_name || github.event.inputs.tag }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.event.inputs.tag, '-') }}
          body: |
            ## VibeCody ${{ github.ref_name || github.event.inputs.tag }}

            AI-powered developer toolchain — terminal assistant + desktop code editor.

            ---

            ### 📦 Downloads

            #### VibeCLI — Terminal AI Assistant

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `vibecli-aarch64-apple-darwin.tar.gz` |
            | macOS (Intel) | `vibecli-x86_64-apple-darwin.tar.gz` |
            | Linux x86_64 | `vibecli-x86_64-linux.tar.gz` |
            | Linux ARM64 | `vibecli-aarch64-linux.tar.gz` |
            | Windows x64 | `vibecli-x86_64-windows.zip` |
            | Docker | `vibecli-docker-*.tar.gz` |

            #### VibeUI — Desktop Code Editor

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `VibeUI-*.dmg` |
            | macOS (Intel) | `VibeUI-*.dmg` |
            | Linux x64 | `.deb` / `.AppImage` |
            | Windows x64 | `.msi` / `.exe` installer |

            #### VibeCLI App — Desktop AI Assistant

            | Platform | Download |
            |----------|----------|
            | macOS | `.dmg` |
            | Linux | `.deb` / `.AppImage` |
            | Windows | `.msi` / `.exe` installer |

            ---

            ### 🚀 Quick Install

            **One-liner (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            **macOS (Apple Silicon):**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name || github.event.inputs.tag }}/vibecli-aarch64-apple-darwin.tar.gz | tar -xz
            sudo mv vibecli /usr/local/bin/
            ```

            **Linux (x86_64):**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name || github.event.inputs.tag }}/vibecli-x86_64-linux.tar.gz | tar -xz
            sudo mv vibecli /usr/local/bin/
            ```

            **Docker:**
            ```bash
            docker load < vibecli-docker-*.tar.gz
            docker run -p 7878:7878 vibecli:${{ github.ref_name || github.event.inputs.tag }}
            ```

            ---

            ### ✅ Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ---

            ### What's Included
            - **VibeCLI**: 17 AI providers, 530+ skills, TUI + REPL, HTTP daemon
            - **VibeUI**: Monaco editor, 139+ panel tabs, 40+ themes, agent mode, CRDT collab
            - **VibeCLI App**: Lightweight desktop wrapper with system tray
            - **5,900+ tests**, zero compiler warnings
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/SHA256SUMS.txt
