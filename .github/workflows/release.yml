name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vibecli
            archive: vibecli-aarch64-apple-darwin.tar.gz

          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: vibecli
            archive: vibecli-x86_64-apple-darwin.tar.gz

          # Linux x86_64 (musl for portability)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: vibecli
            archive: vibecli-x86_64-linux.tar.gz

          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: vibecli
            archive: vibecli-aarch64-linux.tar.gz

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vibecli.exe
            archive: vibecli-x86_64-windows.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: >
          cargo build
          --release
          --package vibecli
          --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          strip "$BINARY" 2>/dev/null || true
          ls -lh "$BINARY"

      - name: Package (Unix tar.gz)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          tar -czf "${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" "${{ matrix.artifact }}"

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          Compress-Archive -Path $src -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Compute SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null | tee SHA256SUMS.txt || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: VibeCLI ${{ github.ref_name || github.event.inputs.tag }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.event.inputs.tag, '-') }}
          body: |
            ## VibeCLI ${{ github.ref_name || github.event.inputs.tag }}

            AI-powered coding assistant for the terminal.

            ### Installation

            **macOS (Apple Silicon)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name || github.event.inputs.tag }}/vibecli-aarch64-apple-darwin.tar.gz | tar -xz
            sudo mv vibecli /usr/local/bin/
            ```

            **macOS (Intel)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name || github.event.inputs.tag }}/vibecli-x86_64-apple-darwin.tar.gz | tar -xz
            sudo mv vibecli /usr/local/bin/
            ```

            **Linux (x86_64)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name || github.event.inputs.tag }}/vibecli-x86_64-linux.tar.gz | tar -xz
            sudo mv vibecli /usr/local/bin/
            ```

            **One-liner install (Linux/macOS)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            ### Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
