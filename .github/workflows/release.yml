name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.5)"
        required: true
        default: "v0.5.5"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  FLUTTER_VERSION: "3.44.2"
  JAVA_VERSION: "17"

jobs:
  # ─── Security audit ───────────────────────────────────────────────────
  # Release-time gate. The broader per-PR security suite lives in
  # .github/workflows/security.yml (cargo-deny, npm audit, gitleaks, semgrep).
  # Here we keep a minimal blocking `cargo audit` so a tag push cannot ship
  # a binary built against a crate with a known RUSTSEC advisory.
  # See docs/security/threat-model.md §7 item #4.
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Generate Cargo.lock (gitignored)
        run: cargo generate-lockfile

      # No `|| true`. Suppressions go in deny.toml [advisories.ignore].
      - name: Run cargo audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2017-0008 --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0320 --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2024-0384 --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2024-0411 --ignore RUSTSEC-2024-0412 --ignore RUSTSEC-2024-0413 --ignore RUSTSEC-2024-0414 --ignore RUSTSEC-2024-0415 --ignore RUSTSEC-2024-0416 --ignore RUSTSEC-2024-0417 --ignore RUSTSEC-2024-0418 --ignore RUSTSEC-2024-0419 --ignore RUSTSEC-2024-0420 --ignore RUSTSEC-2024-0429 --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2025-0057 --ignore RUSTSEC-2025-0075 --ignore RUSTSEC-2025-0080 --ignore RUSTSEC-2025-0081 --ignore RUSTSEC-2025-0098 --ignore RUSTSEC-2025-0100 --ignore RUSTSEC-2025-0119 --ignore RUSTSEC-2025-0134 --ignore RUSTSEC-2025-0141 --ignore RUSTSEC-2026-0002

  # ─── Software Bill of Materials (SBOM, CycloneDX) ─────────────────────
  # Per-release attestation of the dependency tree across all three
  # ecosystems we ship. See docs/security/threat-model.md §7 item #14.
  # The .cdx.json artifacts ride along on the GitHub release so consumers
  # (and auditors) can cross-reference against published advisories at any
  # future date without re-running the build.
  sbom:
    name: Generate SBOMs (CycloneDX)
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked

      - name: Generate Cargo.lock (gitignored)
        run: cargo generate-lockfile

      - name: Rust SBOM
        run: cargo sbom --output-format cyclone_dx_json_1_4 > vibecody-rust.cdx.json

      # TODO: pin to a verified SHA during Phase 3 hardening.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install cdxgen
        run: npm install -g @cyclonedx/cdxgen

      - name: JS SBOMs (vibeui, vibeapp, agent-sdk)
        run: |
          set -euo pipefail
          for dir in vibeui vibeapp packages/agent-sdk; do
            if [ -f "$dir/package.json" ]; then
              ( cd "$dir" && npm install --package-lock-only --ignore-scripts )
              out="$(basename "$dir")-js.cdx.json"
              cdxgen --type js --output "$out" -p "$dir"
              echo "wrote $out"
            else
              echo "skip $dir (no package.json)"
            fi
          done

      # TODO: pin to a verified SHA during Phase 3 hardening.
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python SBOM (vibe-rl-py)
        # Same uv-export gotchas as the pip-audit job: --no-emit-project
        # drops the editable self-ref, --no-hashes works around the
        # uv↔pip hash-format mismatch under --require-hashes.
        run: |
          pip install --upgrade uv cyclonedx-bom
          (
            cd vibe-rl-py
            uv export --frozen --no-emit-project --no-hashes \
              --format requirements-txt --output-file /tmp/vibe-rl-py-requirements.txt
          )
          cyclonedx-py requirements \
            /tmp/vibe-rl-py-requirements.txt \
            -o vibe-rl-py.cdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sboms
          path: |
            vibecody-rust.cdx.json
            vibeui-js.cdx.json
            vibeapp-js.cdx.json
            agent-sdk-js.cdx.json
            vibe-rl-py.cdx.json
          if-no-files-found: error

  # ─── VibeCLI binary (5 platforms) ──────────────────────────────────────
  build-cli:
    name: CLI · ${{ matrix.target }}
    needs: audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vibecli
            archive: vibecli-aarch64-apple-darwin.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vibecli
            archive: vibecli-x86_64-apple-darwin.tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: vibecli
            archive: vibecli-x86_64-linux.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: vibecli
            archive: vibecli-aarch64-linux.tar.gz
            use_cross: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vibecli.exe
            archive: vibecli-x86_64-windows.zip

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl, native)
        if: contains(matrix.target, 'musl') && !matrix.use_cross
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools cmake perl

      - name: Install cross (cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build release binary
        run: >
          ${{ matrix.use_cross && 'cross' || 'cargo' }} build
          --release
          --package vibecli
          --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          strip "$BINARY" 2>/dev/null || true
          ls -lh "$BINARY"

      - name: Package (Unix tar.gz)
        if: runner.os != 'Windows'
        run: |
          tar -czf "${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" "${{ matrix.artifact }}"

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          Compress-Archive -Path $src -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ─── VibeUI desktop app (Tauri) ────────────────────────────────────────
  build-vibeui:
    name: VibeUI · ${{ matrix.label }}
    needs: audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS-arm64
            args: --target aarch64-apple-darwin

          - os: macos-latest
            label: macOS-x64
            args: --target x86_64-apple-darwin

          - os: ubuntu-22.04
            label: Linux-x64
            args: ""

          # GitHub-hosted arm64 Linux runner (free for public repos).
          - os: ubuntu-22.04-arm
            label: Linux-arm64
            args: ""

          - os: windows-latest
            label: Windows-x64
            args: ""

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.label == 'macOS-arm64' && 'aarch64-apple-darwin' || matrix.label == 'macOS-x64' && 'x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: vibeui
        run: npm install --no-audit --no-fund

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: vibeui-${{ matrix.label }}
          workspaces: vibeui/src-tauri

      # ── macOS codesigning (dual-mode) ────────────────────────────────────
      # If APPLE_CERT_P12_BASE64 is set, import the Developer ID cert into a
      # throwaway keychain so `tauri build` can sign with `APPLE_SIGNING_IDENTITY`.
      # When the secret is absent, this step is a no-op and the build falls back
      # to the ad-hoc signing identity ("-") declared in tauri.conf.json — that
      # avoids the macOS "is damaged" Gatekeeper error but still shows the
      # "unidentified developer" first-launch warning (right-click → Open).
      - name: Import Apple Developer ID certificate (macOS)
        id: vibeui-apple-cert
        if: runner.os == 'macOS'
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${CERT_P12_BASE64:-}" ]; then
            echo "::notice::APPLE_CERT_P12_BASE64 not set — building with ad-hoc signature (users will see 'unidentified developer' on first launch and need to right-click → Open)"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        working-directory: vibeui
        env:
          # Tauri picks these up automatically. On non-macOS / when the cert
          # isn't configured, they're all empty and the config-level "-"
          # (ad-hoc) identity is used instead.
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && steps.vibeui-apple-cert.outputs.signed == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && steps.vibeui-apple-cert.outputs.signed == 'true' && secrets.APPLE_ID || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && steps.vibeui-apple-cert.outputs.signed == 'true' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && steps.vibeui-apple-cert.outputs.signed == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
        run: npx tauri build ${{ matrix.args }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find target -name "*.dmg" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.AppImage" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.msi" -exec cp {} dist/ \; 2>/dev/null || true
          find target -path "*/nsis/*.exe" -exec cp {} dist/ \; 2>/dev/null || true
          APP_DIR=$(find target -name "VibeUI.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_DIR" ]; then
            cd "$(dirname "$APP_DIR")" && zip -r "$GITHUB_WORKSPACE/dist/VibeUI-${{ matrix.label }}.app.zip" "VibeUI.app"
          fi
          ls -lhR dist/ || echo "dist/ is empty"
        shell: bash

      - name: Upload VibeUI artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vibeui-${{ matrix.label }}
          path: dist/*

  # ─── VibeCLI desktop app (Tauri) ───────────────────────────────────────
  build-vibeapp:
    name: VibeCLI App · ${{ matrix.label }}
    needs: audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS-arm64
            args: --target aarch64-apple-darwin

          - os: macos-latest
            label: macOS-x64
            args: --target x86_64-apple-darwin

          - os: ubuntu-22.04
            label: Linux-x64
            args: ""

          # GitHub-hosted arm64 Linux runner (free for public repos).
          - os: ubuntu-22.04-arm
            label: Linux-arm64
            args: ""

          - os: windows-latest
            label: Windows-x64
            args: ""

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.label == 'macOS-arm64' && 'aarch64-apple-darwin' || matrix.label == 'macOS-x64' && 'x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: vibeapp
        run: npm install --no-audit --no-fund

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: vibeapp-${{ matrix.label }}
          workspaces: vibeapp/src-tauri

      # ── macOS codesigning (dual-mode) — see build-vibeui for full rationale.
      - name: Import Apple Developer ID certificate (macOS)
        id: vibeapp-apple-cert
        if: runner.os == 'macOS'
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${CERT_P12_BASE64:-}" ]; then
            echo "::notice::APPLE_CERT_P12_BASE64 not set — building with ad-hoc signature (users will see 'unidentified developer' on first launch and need to right-click → Open)"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        working-directory: vibeapp
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && steps.vibeapp-apple-cert.outputs.signed == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && steps.vibeapp-apple-cert.outputs.signed == 'true' && secrets.APPLE_ID || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && steps.vibeapp-apple-cert.outputs.signed == 'true' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && steps.vibeapp-apple-cert.outputs.signed == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
        run: npx tauri build ${{ matrix.args }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find target -name "*.dmg" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.AppImage" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.msi" -exec cp {} dist/ \; 2>/dev/null || true
          find target -path "*/nsis/*.exe" -exec cp {} dist/ \; 2>/dev/null || true
          ls -lhR dist/ || echo "dist/ is empty"
        shell: bash

      - name: Upload VibeCLI App artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vibeapp-${{ matrix.label }}
          path: dist/*

  # ─── VibeCody Mobile — Android (APK + AAB) ────────────────────────────
  build-android:
    name: Mobile · Android
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: vibemobile
        run: flutter pub get

      - name: Run Flutter tests
        working-directory: vibemobile
        run: flutter test

      - name: Build Android APK (fat / universal)
        working-directory: vibemobile
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build Android App Bundle (AAB)
        working-directory: vibemobile
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Collect Android artifacts
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          mkdir -p dist
          cp vibemobile/build/app/outputs/flutter-apk/app-release.apk \
             "dist/VibeCody-Mobile-${TAG}-android.apk"
          cp vibemobile/build/app/outputs/bundle/release/app-release.aab \
             "dist/VibeCody-Mobile-${TAG}-android.aab"
          ls -lh dist/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vibemobile-android
          path: dist/*

  # ─── VibeCody Mobile — iOS (IPA) ──────────────────────────────────────
  build-ios:
    name: Mobile · iOS
    needs: audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Pin Xcode 26 — iOS 26 SDK is the required build SDK from April 28, 2026.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4 # v1.7.0
        with:
          xcode-version: ^26.0

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: vibemobile
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: vibemobile/ios
        run: pod install --repo-update || true

      - name: Build iOS (no codesign — archive for distribution)
        working-directory: vibemobile
        run: |
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create unsigned IPA
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          mkdir -p dist Payload
          cp -r vibemobile/build/ios/iphoneos/Runner.app Payload/
          cd Payload && zip -r "../dist/VibeCody-Mobile-${TAG}-ios.ipa" Runner.app
          cd .. && rm -rf Payload
          ls -lh dist/

      - name: Upload iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vibemobile-ios
          path: dist/*

  # ─── VibeCody Watch — Wear OS (APK + AAB) ─────────────────────────────
  build-wear:
    name: Watch · Wear OS
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-wear-${{ hashFiles('vibewatch/VibeCodyWear/**/*.gradle*', 'vibewatch/VibeCodyWear/**/gradle-wrapper.properties') }}

      - name: Build Wear OS APK + AAB
        working-directory: vibewatch/VibeCodyWear
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Collect Wear OS artifacts
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          mkdir -p dist
          cp vibewatch/VibeCodyWear/app/build/outputs/apk/release/app-release*.apk \
             "dist/VibeCody-Wear-${TAG}.apk" 2>/dev/null || \
            cp vibewatch/VibeCodyWear/app/build/outputs/apk/release/app-release-unsigned.apk \
               "dist/VibeCody-Wear-${TAG}.apk"
          cp vibewatch/VibeCodyWear/app/build/outputs/bundle/release/app-release.aab \
             "dist/VibeCody-Wear-${TAG}.aab"
          ls -lh dist/

      - name: Upload Wear OS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vibewatch-wear
          path: dist/*

  # ─── VibeCody Watch — watchOS (unsigned .app.zip) ─────────────────────
  build-watchos:
    name: Watch · watchOS
    needs: audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Pin Xcode 26 so builds link against the watchOS 26 SDK — required
      # for App Store Connect submissions from April 28, 2026 onward.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4 # v1.7.0
        with:
          xcode-version: ^26.0

      - name: Build watchOS app (Simulator, unsigned)
        working-directory: vibewatch
        run: |
          xcodebuild \
            -project VibeCodyWatch.xcodeproj \
            -scheme VibeCodyWatch \
            -configuration Release \
            -destination 'generic/platform=watchOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package watchOS .app
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          mkdir -p dist
          APP_DIR=$(find vibewatch/build/DerivedData -type d -name "VibeCodyWatch.app" | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "✗ VibeCodyWatch.app not found"; exit 1
          fi
          cd "$(dirname "$APP_DIR")"
          zip -r "$GITHUB_WORKSPACE/dist/VibeCody-WatchOS-${TAG}.app.zip" "VibeCodyWatch.app"
          ls -lh "$GITHUB_WORKSPACE/dist/"

      - name: Upload watchOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vibewatch-watchos
          path: dist/*

  # ─── VibeCody Watch — watchOS signed IPA (TestFlight / Ad Hoc) ────────
  #
  # No-op unless APPLE_TEAM_ID is configured as a repo secret. To enable:
  #
  #   Required secrets:
  #     APPLE_TEAM_ID                         10-char team ID
  #     APPLE_CERT_P12_BASE64                 base64(distribution .p12)
  #     APPLE_CERT_P12_PASSWORD               password for the .p12
  #     APPLE_KEYCHAIN_PASSWORD               any random string (temp keychain)
  #     APPLE_PROVISIONING_PROFILE_BASE64     base64(.mobileprovision)
  #
  #   Optional (enables auto-upload to TestFlight):
  #     APPLE_ASC_KEY_ID                      App Store Connect API key ID
  #     APPLE_ASC_ISSUER_ID                   App Store Connect issuer ID
  #     APPLE_ASC_KEY_BASE64                  base64(AuthKey_<KEY_ID>.p8)
  #
  #   Optional repo variable:
  #     WATCHOS_EXPORT_METHOD                 'app-store-connect' (default)
  #                                           or 'release-testing' for Ad Hoc
  build-watchos-signed:
    name: Watch · watchOS (signed)
    needs: audit
    runs-on: macos-latest
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      EXPORT_METHOD: ${{ vars.WATCHOS_EXPORT_METHOD || 'app-store-connect' }}
    steps:
      - name: Check Apple signing credentials
        if: steps.apple-secrets.outputs.skip != 'true'
        id: apple-secrets
        run: |
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::No APPLE_TEAM_ID secret — skipping watchOS signed build"
          fi
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: steps.apple-secrets.outputs.skip != 'true'

      - name: Select Xcode 26
        if: steps.apple-secrets.outputs.skip != 'true'
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4 # v1.7.0
        with:
          xcode-version: ^26.0

      - name: Import signing certificate into temp keychain
        if: steps.apple-secrets.outputs.skip != 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

      - name: Install provisioning profile
        if: steps.apple-secrets.outputs.skip != 'true'
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$PROFILE_DIR/VibeCodyWatch.mobileprovision"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Archive watchOS app (device)
        if: steps.apple-secrets.outputs.skip != 'true'
        working-directory: vibewatch
        run: |
          xcodebuild archive \
            -project VibeCodyWatch.xcodeproj \
            -scheme VibeCodyWatch \
            -configuration Release \
            -destination 'generic/platform=watchOS' \
            -archivePath build/VibeCodyWatch.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID"

      - name: Write exportOptions.plist
        if: steps.apple-secrets.outputs.skip != 'true'
        run: |
          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>${EXPORT_METHOD}</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF

      - name: Export signed IPA
        if: steps.apple-secrets.outputs.skip != 'true'
        working-directory: vibewatch
        run: |
          xcodebuild -exportArchive \
            -archivePath build/VibeCodyWatch.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"

      - name: Package IPA
        if: steps.apple-secrets.outputs.skip != 'true'
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          mkdir -p dist
          cp vibewatch/build/ipa/*.ipa "dist/VibeCody-WatchOS-${TAG}-signed.ipa"
          ls -lh dist/

      - name: Upload to TestFlight
        if: steps.apple-secrets.outputs.skip != 'true'
        env:
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.APPLE_ASC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo -n "$ASC_KEY_BASE64" | base64 --decode -o "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          IPA=$(ls dist/VibeCody-WatchOS-*-signed.ipa | head -1)
          xcrun altool --upload-app \
            --type watchos \
            --file "$IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload signed IPA artifact
        if: steps.apple-secrets.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vibewatch-watchos-signed
          path: dist/*

  # ─── Linux forward-compat smoke (Ubuntu 24.04 / webkit2gtk-4.1) ──────
  #
  # Ubuntu 26.04 LTS drops 2026-04-23. GitHub will eventually roll
  # `ubuntu-latest` forward. This job validates that the Tauri crates
  # still compile against the webkit2gtk-4.1 headers shipped by newer
  # distros — purely informational; not in release.needs[] and flagged
  # continue-on-error so a future distro regression never blocks a tag.
  smoke-linux-next:
    name: Smoke · Linux-next (Ubuntu 24.04)
    needs: audit
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: smoke-linux-next
          workspaces: |
            vibeui/src-tauri
            vibeapp/src-tauri

      - name: Check VibeUI Tauri crate
        working-directory: vibeui/src-tauri
        run: cargo check --release

      - name: Check VibeCLI App Tauri crate
        working-directory: vibeapp/src-tauri
        run: cargo check --release

  # ─── Docker image ──────────────────────────────────────────────────────
  build-docker:
    name: Docker Image
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3

      - name: Build Docker image
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          docker build -t vibecli:${TAG} -t vibecli:latest .
          docker save vibecli:${TAG} | gzip > vibecli-docker-${TAG}.tar.gz
          ls -lh vibecli-docker-*.tar.gz

      - name: Upload Docker artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vibecli-docker
          path: vibecli-docker-*.tar.gz

  # ─── Firecracker Tier-3 rootfs ─────────────────────────────────────────
  # Builds the BusyBox + bash ext4 image consumed by the Tier-3 microVM
  # sandbox (slice F1 — see docs/design/sandbox-tiers/03-firecracker-tier.md).
  # The image is content-addressed via SHA256; the daemon verifies on
  # download before mounting. Cosign keyless attestation is added so a
  # third party can confirm the image was built from this commit + this
  # workflow run, not pushed by a compromised maintainer key.
  build-firecracker-rootfs:
    name: Firecracker Tier-3 Rootfs
    needs: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required for cosign keyless OIDC
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Build rootfs.ext4
        run: |
          make rootfs-firecracker
          test -f target/firecracker-rootfs/rootfs.ext4
          test -f target/firecracker-rootfs/rootfs.ext4.sha256
          # Tag the artifact filename with the release version so it
          # doesn't collide with other releases in the same Releases page.
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          mkdir -p artifacts-rootfs
          cp target/firecracker-rootfs/rootfs.ext4 \
             "artifacts-rootfs/vibecody-firecracker-rootfs-${TAG}.ext4"
          cp target/firecracker-rootfs/rootfs.ext4.sha256 \
             "artifacts-rootfs/vibecody-firecracker-rootfs-${TAG}.ext4.sha256"
          ls -lh artifacts-rootfs/

      - name: Cosign keyless attest (Sigstore)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          IMG="artifacts-rootfs/vibecody-firecracker-rootfs-${TAG}.ext4"
          # `cosign sign-blob` issues a Fulcio cert from the GitHub Actions
          # OIDC token (no long-lived keys) and writes the signature +
          # cert next to the blob. `cosign verify-blob` on a downloader's
          # machine will then check the bundle against the Rekor transparency
          # log and the Fulcio root.
          cosign sign-blob --yes \
            --bundle "${IMG}.cosign.bundle" \
            "${IMG}"
          ls -lh "${IMG}.cosign.bundle"

      - name: Run F1 artifact-contract tests
        run: |
          cargo test -p vibe-sandbox-firecracker --test f1_rootfs_artifact

      - name: Upload Firecracker rootfs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vibecody-firecracker-rootfs
          path: artifacts-rootfs/*

  # ─── Publish GitHub Release ────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [sbom, build-cli, build-vibeui, build-vibeapp, build-android, build-ios, build-wear, build-watchos, build-docker, build-firecracker-rootfs]
    # Publish even if optional jobs (mobile, watch, docker, SBOM) fail.
    # Critical: CLI, VibeUI, VibeApp, Firecracker rootfs must succeed.
    if: >-
      ${{
        !cancelled() &&
        needs.build-cli.result == 'success' &&
        needs.build-vibeui.result == 'success' &&
        needs.build-vibeapp.result == 'success' &&
        needs.build-firecracker-rootfs.result == 'success'
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Compute SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.apk" -o -name "*.aab" -o -name "*.ipa" \) -exec sha256sum {} \; | sed 's|  \./|  |' | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: VibeCody ${{ github.ref_name || github.event.inputs.tag }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.event.inputs.tag, '-') }}
          body: |
            ## VibeCody ${{ github.ref_name || github.event.inputs.tag }}

            AI-powered developer toolchain — terminal assistant, desktop code editor, and mobile companion.

            ---

            ### Downloads

            #### VibeCLI — Terminal AI Assistant

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `vibecli-aarch64-apple-darwin.tar.gz` |
            | macOS (Intel) | `vibecli-x86_64-apple-darwin.tar.gz` |
            | Linux x86_64 | `vibecli-x86_64-linux.tar.gz` |
            | Linux ARM64 | `vibecli-aarch64-linux.tar.gz` |
            | Windows x64 | `vibecli-x86_64-windows.zip` |
            | Docker | `vibecli-docker-*.tar.gz` |

            #### VibeUI — Desktop Code Editor

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `VibeUI-macOS-arm64.app.zip` / `.dmg` |
            | macOS (Intel) | `VibeUI-macOS-x64.app.zip` / `.dmg` |
            | Linux x64 | `.deb` / `.AppImage` |
            | Linux arm64 | `.deb` / `.AppImage` |
            | Windows x64 | `.msi` / `.exe` installer |

            #### VibeCLI App — Desktop AI Assistant

            | Platform | Download |
            |----------|----------|
            | macOS | `.dmg` |
            | Linux x64 | `.deb` / `.AppImage` |
            | Linux arm64 | `.deb` / `.AppImage` |
            | Windows | `.msi` / `.exe` installer |

            #### VibeCody Mobile — iOS & Android

            | Platform | Download |
            |----------|----------|
            | Android (APK) | `VibeCody-Mobile-*-android.apk` |
            | Android (AAB) | `VibeCody-Mobile-*-android.aab` |
            | iOS (IPA) | `VibeCody-Mobile-*-ios.ipa` |

            #### VibeCody Watch — watchOS & Wear OS

            | Platform | Download |
            |----------|----------|
            | watchOS (Simulator .app, unsigned) | `VibeCody-WatchOS-*.app.zip` |
            | Wear OS (APK) | `VibeCody-Wear-*.apk` |
            | Wear OS (AAB) | `VibeCody-Wear-*.aab` |

            #### Sandbox — Firecracker Tier-3 rootfs (optional)

            | Artifact | Purpose |
            |----------|---------|
            | `vibecody-firecracker-rootfs-*.ext4` | BusyBox + bash microVM rootfs (20 MiB), consumed by `FirecrackerSandbox` on Linux + KVM |
            | `vibecody-firecracker-rootfs-*.ext4.sha256` | Content-addressed integrity check |
            | `vibecody-firecracker-rootfs-*.ext4.cosign.bundle` | Sigstore keyless attestation (verifies build provenance via Rekor) |

            ---

            ### Quick Install

            **One-liner (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            **macOS (Apple Silicon):**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name || github.event.inputs.tag }}/vibecli-aarch64-apple-darwin.tar.gz | tar -xz
            sudo mv vibecli /usr/local/bin/
            ```

            **Linux (x86_64):**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name || github.event.inputs.tag }}/vibecli-x86_64-linux.tar.gz | tar -xz
            sudo mv vibecli /usr/local/bin/
            ```

            **Docker:**
            ```bash
            docker load < vibecli-docker-*.tar.gz
            docker run -p 7878:7878 vibecli:${{ github.ref_name || github.event.inputs.tag }}
            ```

            **Android:**
            Download `VibeCody-Mobile-*-android.apk` and sideload, or upload the `.aab` to Google Play Console.

            **iOS:**
            Download `VibeCody-Mobile-*-ios.ipa` and install via TestFlight, Apple Configurator, or re-sign with your distribution certificate.

            ---

            ### Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ---

            ### What's New in ${{ github.ref_name || github.event.inputs.tag }}

            - **Parallel Agent Spawning** — Claude Code-style `/spawn` command: launch multiple autonomous agents, decompose tasks, aggregate results
            - **Agent Pool Management** — Priority queuing, pause/resume, inter-agent messaging, conflict detection
            - **SpawnAgentPanel** — VibeUI panel for managing parallel agents with live progress tracking
            - **iOS & Android builds** — VibeCody Mobile companion app now included in releases
            - **150+ VibeUI panels**, 18 AI providers, 540+ skills, 6,000+ tests

            ### Full Platform Matrix

            | Product | macOS arm64 | macOS x64 | Linux x64 | Linux arm64 | Windows x64 | Android | iOS | watchOS | Wear OS | Docker |
            |---------|:-----------:|:---------:|:---------:|:-----------:|:-----------:|:-------:|:---:|:-------:|:-------:|:------:|
            | VibeCLI | x | x | x | x | x | | | | | x |
            | VibeUI | x | x | x | x | x | | | | | |
            | VibeCLI App | x | x | x | x | x | | | | | |
            | VibeCody Mobile | | | | | | x | x | | | |
            | VibeCody Watch | | | | | | | | x | x | |
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.cdx.json
            artifacts/**/SHA256SUMS.txt
