name: CI

# Gate for every PR and push to main. Runs the test suite, linters, and format
# checks across all four ecosystems (Rust, TypeScript/Node, Flutter/Dart, Kotlin).
# See docs/security/threat-model.md §7 for the security-gate companion.

on:
  pull_request:
  push:
    branches: [main]
  # Allow manual trigger for debugging
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  FLUTTER_VERSION: "3.29.3"
  JAVA_VERSION: "17"

jobs:
  # ─── Rust: fmt, clippy, test ───────────────────────────────────────────
  rust-checks:
    name: Rust (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      - name: Install Linux system dependencies
        if: matrix.check == 'clippy'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo registry + target
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-ci-${{ matrix.check }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-ci-${{ matrix.check }}-

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Check formatting
        if: matrix.check == 'fmt'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: matrix.check == 'clippy'
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Run tests
        if: matrix.check == 'test'
        run: cargo test --workspace

  # ─── VibeUI: TypeScript + React ────────────────────────────────────────
  vibeui-checks:
    name: VibeUI (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibeui
    strategy:
      fail-fast: false
      matrix:
        check: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # package-lock.json is gitignored, so we use npm install (not npm ci).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (ESLint)
        if: matrix.check == 'lint'
        run: npm run lint

      - name: Type check (tsc --noEmit)
        if: matrix.check == 'typecheck'
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        if: matrix.check == 'test'
        run: npm test

  # ─── VibeApp: TypeScript ───────────────────────────────────────────────
  vibeapp-checks:
    name: VibeApp (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibeapp
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # package-lock.json is gitignored, so we use npm install (not npm ci).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check (tsc --noEmit)
        if: matrix.check == 'typecheck'
        run: npx tsc --noEmit

  # ─── Agent SDK: TypeScript ─────────────────────────────────────────────
  agent-sdk-checks:
    name: Agent SDK (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent-sdk
    strategy:
      fail-fast: false
      matrix:
        check: [lint, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # package-lock.json is gitignored, so we use npm install (not npm ci).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check + lint (tsc --noEmit)
        if: matrix.check == 'lint'
        run: npm run lint

      - name: Unit tests (vitest)
        if: matrix.check == 'test'
        run: npm test

  # ─── VibeCody Mobile: Flutter/Dart ────────────────────────────────────
  mobile-checks:
    name: Mobile (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibemobile
    strategy:
      fail-fast: false
      matrix:
        check: [analyze, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        if: matrix.check == 'analyze'
        run: dart analyze --fatal-infos

      - name: Flutter test
        if: matrix.check == 'test'
        run: flutter test

  # ─── Aggregate gate ────────────────────────────────────────────────────
  # Single required check for branch protection — easier than listing every
  # individual job in repo settings.
  ci-gate:
    name: CI gate (required)
    runs-on: ubuntu-latest
    needs:
      - rust-checks
      - vibeui-checks
      - vibeapp-checks
      - agent-sdk-checks
      - mobile-checks
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ needs.rust-checks.result }}"      != "success" ]] || \
             [[ "${{ needs.vibeui-checks.result }}"    != "success" ]] || \
             [[ "${{ needs.vibeapp-checks.result }}"   != "success" ]] || \
             [[ "${{ needs.agent-sdk-checks.result }}" != "success" ]] || \
             [[ "${{ needs.mobile-checks.result }}"    != "success" ]]; then
            echo "::error::One or more CI checks failed. See individual job logs."
            exit 1
          fi
          echo "All CI checks passed."
