name: CI

# Gate for every PR and push to main. Runs the test suite, linters, and format
# checks across all four ecosystems (Rust, TypeScript/Node, Flutter/Dart, Kotlin).
# See docs/security/threat-model.md §7 for the security-gate companion.

on:
  pull_request:
  push:
    branches: [main]
  # Allow manual trigger for debugging
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  FLUTTER_VERSION: "3.44.2"
  JAVA_VERSION: "17"

jobs:
  # ─── Rust: fmt, clippy, test ───────────────────────────────────────────
  rust-checks:
    name: Rust (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      # Tauri system deps — required by vibe-coder / vibeapp crates on Linux.
      # Both clippy and test compile the full workspace (including Tauri crates)
      # which transitively depends on webkit2gtk-sys → glib-sys.
      - name: Install Linux system dependencies
        if: matrix.check == 'clippy' || matrix.check == 'test'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo registry + target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-ci-${{ matrix.check }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-ci-${{ matrix.check }}-

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Check formatting
        if: matrix.check == 'fmt'
        run: cargo fmt --all -- --check

      # NOTE: --all-features is intentionally omitted. Several workspace
      # features (candle-metal, mistralrs-metal) require macOS/Apple
      # platforms and won't compile on Linux. The release workflow uses
      # --all-features on macOS runners where those features are available.
      - name: Run clippy
        if: matrix.check == 'clippy'
        run: cargo clippy --workspace

      - name: Run tests
        if: matrix.check == 'test'
        # A handful of tests mutate process-wide env vars (VIBECLI_SKILLS_DIR,
        # HOME). Run them serially to avoid races between concurrent tests
        # sharing one global env. Locally `cargo test` defaults to threads=N,
        # which masks these races on dev machines.
        #
        # --lib --bins --tests skips doctests. Several module-level `//!` docs
        # contain ```-fenced REPL command listings that rustdoc treats as Rust
        # code and tries to compile (and fails). Those need a separate cleanup
        # pass (s/```/```text/) — tracked separately so the CI gate stays green.
        env:
          RUST_TEST_THREADS: "1"
        run: cargo test --workspace --exclude vibe-memory --exclude vibe-broker --lib --bins --tests

  # ─── VibeCoder: TypeScript + React ────────────────────────────────────────
  vibecoder-checks:
    name: VibeCoder (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibecoder
    strategy:
      fail-fast: false
      matrix:
        check: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # package-lock.json is gitignored, so we use npm install (not npm ci).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (ESLint)
        if: matrix.check == 'lint'
        run: npm run lint

      - name: Type check (tsc --noEmit)
        if: matrix.check == 'typecheck'
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        if: matrix.check == 'test'
        run: npm test

  # ─── VibeApp: TypeScript ───────────────────────────────────────────────
  vibeapp-checks:
    name: VibeApp (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibeapp
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # package-lock.json is gitignored, so we use npm install (not npm ci).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check (tsc --noEmit)
        if: matrix.check == 'typecheck'
        run: npx tsc --noEmit

  # ─── Agent SDK: TypeScript ─────────────────────────────────────────────
  agent-sdk-checks:
    name: Agent SDK (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent-sdk
    strategy:
      fail-fast: false
      matrix:
        check: [lint, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # package-lock.json is gitignored, so we use npm install (not npm ci).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check + lint (tsc --noEmit)
        if: matrix.check == 'lint'
        run: npm run lint

      - name: Unit tests (vitest)
        if: matrix.check == 'test'
        run: npm test

  # ─── VibeCody Mobile: Flutter/Dart ────────────────────────────────────
  mobile-checks:
    name: Mobile (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibemobile
    strategy:
      fail-fast: false
      matrix:
        check: [analyze, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        if: matrix.check == 'analyze'
        run: dart analyze --fatal-infos

      - name: Flutter test
        if: matrix.check == 'test'
        run: flutter test

  # ─── Documentation: Markdown linting ────────────────────────────────
  docs-check:
    name: Documentation (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    strategy:
      fail-fast: false
      matrix:
        check: [lint]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install remark and plugins
        run: npm install remark-cli@12 @wooorm/storyline-preset@1 remark-preset-lint-recommended@6 remark-lint-no-duplicate-headers@4 remark-lint-max-blank-lines@2 remark-lint-heading-style@3 remark-lint-list-item-indent@2 remark-lint-maximum-line-length@6

      - name: Lint Markdown files
        if: matrix.check == "lint"
        run: npx remark . --frail --quiet --ignore-component-path=false

  # ─── Aggregate gate ────────────────────────────────────────────────────
  # Single required check for branch protection — easier than listing every
  # individual job in repo settings.
  ci-gate:
    name: CI gate (required)
    runs-on: ubuntu-latest
    needs:
      - rust-checks
      - vibecoder-checks
      - vibeapp-checks
      - agent-sdk-checks
      - mobile-checks
      - docs-check
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ needs.rust-checks.result }}"      != "success" ]] || \
             [[ "${{ needs.vibecoder-checks.result }}"    != "success" ]] || \
             [[ "${{ needs.vibeapp-checks.result }}"   != "success" ]] || \
             [[ "${{ needs.agent-sdk-checks.result }}" != "success" ]] || \
             [[ "${{ needs.mobile-checks.result }}"    != "success" ]] || \
             [[ "${{ needs.docs-check.result }}"       != "success" ]]; then
            echo "::error::One or more CI checks failed. See individual job logs."
            exit 1
          fi
          echo "All CI checks passed."
