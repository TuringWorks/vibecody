# VibeCody — credential-logging SAST rules.
#
# Blocks DREAD #16: credentials (API keys, bearer tokens, refresh tokens,
# OAuth client secrets, user passwords) leaking into the tracing
# subscriber's log file via `tracing::*!` format-string interpolation.
#
# The newtype `vibecli::redact::Redact<T>` exists for the opposite case:
# wrap a credential at its origin so `{:?}` of any struct containing it
# prints `[redacted]`. This semgrep rule guards the residual surface
# where a developer might write `tracing::info!("key={api_key}")` directly
# against a `String`-typed variable.
#
# Scope: workspace Rust code. Tests are excluded via `paths.exclude`
# because credential fixtures (`"sk-test"`, `"BSA-key"`) intentionally
# appear in unit/BDD code.
#
# See docs/security/threat-model.md §7 item #16.

rules:
  - id: tracing-format-leaks-credential
    languages: [rust]
    severity: ERROR
    paths:
      include:
        - "vibecli/vibecli-cli/src/**/*.rs"
        - "vibeui/src-tauri/src/**/*.rs"
        - "vibeui/crates/**/*.rs"
        - "vibecli/crates/**/*.rs"
      exclude:
        - "**/tests/**"
        - "**/*_test.rs"
        - "**/*_bdd.rs"
        - "**/test_*.rs"
    message: >-
      This `tracing::*!` call interpolates a variable whose name suggests
      it holds a credential (api_key / api_token / bearer / secret /
      password / refresh_token) directly into the format string. Even if
      the value is a `Redact<T>` newtype today, a future refactor that
      changes the type to `String` would silently start leaking the
      credential into the daemon log file (DREAD #16). Wrap the field
      in `vibecli::redact::Redact<…>` at its origin and let the newtype's
      `Debug`/`Display` impl handle redaction, or — if you genuinely
      need the value in the log line — use `tracing::info!(field =
      %"[redacted-on-purpose-because-X]", "…")` and document why.
    patterns:
      - pattern-either:
          - pattern: tracing::info!($FMT, ...)
          - pattern: tracing::warn!($FMT, ...)
          - pattern: tracing::error!($FMT, ...)
          - pattern: tracing::debug!($FMT, ...)
          - pattern: tracing::trace!($FMT, ...)
      - metavariable-pattern:
          metavariable: $FMT
          patterns:
            - pattern-regex: "\\{[a-zA-Z_][a-zA-Z0-9_]*\\.?(api_key|api_token|bearer|secret|password|refresh_token|access_token|client_secret)[a-zA-Z0-9_]*[:?#]?[^}]*\\}"

  - id: println-leaks-credential
    languages: [rust]
    severity: WARNING
    paths:
      include:
        - "vibecli/vibecli-cli/src/**/*.rs"
        - "vibeui/src-tauri/src/**/*.rs"
        - "vibeui/crates/**/*.rs"
        - "vibecli/crates/**/*.rs"
      exclude:
        - "**/tests/**"
        - "**/*_test.rs"
        - "**/*_bdd.rs"
        - "**/test_*.rs"
        # Banner / help text intentionally echoes configured provider names
        # (not the keys themselves) — those sites use `*_configured: bool`.
        - "**/banner.rs"
    message: >-
      `println!` / `eprintln!` interpolates a credential-shaped variable
      directly. Even though stdout is interactive-only (not the daemon's
      persistent log file), CI captures stdout and a stray println can
      surface in build logs (DREAD #16). Use `Redact<…>` at the origin
      or render `[redacted]` explicitly.
    patterns:
      - pattern-either:
          - pattern: println!($FMT, ...)
          - pattern: eprintln!($FMT, ...)
      - metavariable-pattern:
          metavariable: $FMT
          patterns:
            - pattern-regex: "\\{[a-zA-Z_][a-zA-Z0-9_]*\\.?(api_key|api_token|bearer|secret|password|refresh_token|access_token|client_secret)[a-zA-Z0-9_]*[:?#]?[^}]*\\}"
