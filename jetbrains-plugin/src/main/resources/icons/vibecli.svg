<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- VibeCLI logo: terminal prompt symbol -->
  <rect width="16" height="16" rx="3" fill="#1e1e2e"/>
  <!-- '>' prompt arrow -->
  <polyline points="3,5 7,8 3,11" fill="none" stroke="#64b4ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- '_' cursor bar -->
  <line x1="8" y1="11" x2="13" y2="11" stroke="#64b4ff" stroke-width="1.8" stroke-linecap="round"/>
</svg>
