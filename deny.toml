# cargo-deny config — see https://embarkstudios.github.io/cargo-deny/
#
# Run locally:   cargo deny check
# CI enforces:   .github/workflows/security.yml
#
# Policy:
#   advisories  → vulnerability = "deny"; ignore list is timestamped + reviewed quarterly
#   licenses    → permissive allowlist + explicit copyleft policy
#   bans        → no duplicate major versions, no banned crates
#   sources     → only crates.io + a small list of explicitly trusted git remotes

[graph]
# Audit every target the workspace can build for. Keep aligned with release.yml matrix.
targets = [
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-musl" },
    { triple = "x86_64-pc-windows-msvc" },
]
all-features = false
no-default-features = false

[advisories]
db-path = "$CARGO_HOME/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
yanked = "warn"
ignore = [
    # Format: { id = "RUSTSEC-YYYY-NNNN", reason = "...", expiration = "YYYY-MM-DD" }
    # Every entry MUST have a reason and an expiration. Quarterly review.
    #
    # Triage baseline 2026-05-20 (commit 7b82e68b → this commit): the
    # Security workflow had been failing at the cargo-deny install step
    # for ~6+ commits prior to 6ab99683, so the advisories below all
    # pre-date the visibility window. Each entry is suppressed to the
    # 2026-08-19 quarterly review checkpoint; the review must either
    # bump the dep that drags the unmaintained crate in or extend the
    # expiration with a fresh dated justification.
    #
    # RUSTSEC-2026-0008 (git2 unsound Buf deref) was fixed at the source
    # by bumping git2 0.19 → 0.20.4 in the workspace Cargo.toml, so it
    # does NOT appear here. Only deny.toml entries are advisories with
    # no actionable upstream fix or with a deep transitive chain we
    # can't unilaterally cut.

    # ── Real vulnerability ────────────────────────────────────────────
    { id = "RUSTSEC-2023-0071", reason = "Marvin Attack timing sidechannel in `rsa` 0.9 — no upstream fix yet. Used only by vibe-broker token_mint.rs::GcpServiceAccountMinter::build_signed_jwt for outbound JWT signing (RSASSA-PKCS1v15 with RandomizedSigner + OsRng). Attack requires network-observable timing of our private-key operations; threat model doesn't apply because the broker signs locally and emits the result in an outbound HTTPS request. Re-evaluate when the RustCrypto/RSA constant-time port lands.", expiration = "2026-08-19" },

    # ── Tauri 2.x Linux stack (gtk3 bindings family) ──────────────────
    # All ten of these are gtk-rs GTK3 transitives pulled in by
    # tauri 2.11.2 → tray-icon / muda / tao / webkit2gtk / wry / rfd /
    # libappindicator on Linux. Tauri's roadmap moves to gtk4 +
    # webkit2gtk-6.0; until that lands upstream we can't cut these.
    { id = "RUSTSEC-2024-0411", reason = "gtk-rs GTK3 unmaintained — Tauri 2.x Linux dep (transitive via tauri/tray-icon/wry). Tracked in https://github.com/tauri-apps/tauri/issues — awaits Tauri's gtk4 migration.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0412", reason = "gtk-rs GTK3 unmaintained — same chain as 2024-0411.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0413", reason = "gtk-rs GTK3 unmaintained — same chain as 2024-0411.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0414", reason = "gtk-rs GTK3 unmaintained — same chain as 2024-0411.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0415", reason = "gtk-rs GTK3 unmaintained — same chain as 2024-0411.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0416", reason = "gtk-rs GTK3 unmaintained — same chain as 2024-0411.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0417", reason = "gtk-rs GTK3 unmaintained — same chain as 2024-0411.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0418", reason = "gtk-rs GTK3 unmaintained — same chain as 2024-0411.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0419", reason = "gtk-rs GTK3 unmaintained — same chain as 2024-0411.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0420", reason = "gtk-rs GTK3 unmaintained — same chain as 2024-0411.", expiration = "2026-08-19" },

    # ── unic-* family ─────────────────────────────────────────────────
    # All transitive from a single upstream Unicode handler chain. Five
    # separate IDs because each unic-* subcrate has its own advisory.
    # Replacement candidate is icu4x; not a 1:1 drop-in.
    { id = "RUSTSEC-2025-0075", reason = "unic-char-range unmaintained — transitive Unicode. Replacement candidate is icu4x. Single root cause covers 2025-0075/0080/0081/0098/0100.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2025-0080", reason = "unic-common unmaintained — same root cause as 2025-0075.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2025-0081", reason = "unic-char-property unmaintained — same root cause as 2025-0075.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version unmaintained — same root cause as 2025-0075.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident unmaintained — same root cause as 2025-0075.", expiration = "2026-08-19" },

    # ── Common transitive unmaintained crates ─────────────────────────
    { id = "RUSTSEC-2017-0008", reason = "`serial` unmaintained — transitive; project does not call into it directly. Investigate at quarterly review whether the parent dep still needs serial port support.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0320", reason = "yaml-rust unmaintained — transitive. Replacement candidate is yaml-rust2 or serde_yaml. Owning dep needs to migrate.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error 1.x unmaintained (also drags syn 1.x duplicate). Replacement is proc-macro-error2. Transitive through several proc-macro deps; no direct project use.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0384", reason = "instant unmaintained — transitive time crate, web_time / std::time::Instant are the modern replacements. Owning dep needs to migrate.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0388", reason = "derivative unmaintained — transitive via keyring → secret-service → zbus 3.x. Tied to the keyring dep upgrade.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained — widely-transitive macro helper. No direct project use; no security implications beyond maintenance status.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2025-0057", reason = "fxhash unmaintained — transitive via mistralrs-core → bm25. Pinned through the TuringWorks/mistral.rs fork; bump on next fork sync.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix unmaintained — transitive (likely via a progress-bar lib).", expiration = "2026-08-19" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained — superseded by rustls-pki-types. Transitive; tied to the broader rustls ecosystem upgrade.", expiration = "2026-08-19" },
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x unmaintained — transitive via syntect 5.3 and vibe-memory. bincode 2.x is a non-trivial API rewrite; track syntect's migration.", expiration = "2026-08-19" },
]

[licenses]
version = 2
# Permissive licenses we accept without further review.
# Additions require a one-line rationale (in this file or the PR description).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",                  # Zero-clause BSD; permissive (doctest-file, recvmsg, …)
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",               # weak copyleft — file-level, acceptable for libraries
    "OpenSSL",
    "BSL-1.0",               # Boost Software License; permissive (clipboard-win, error-code)
    "CDLA-Permissive-2.0",   # Permissive; used by webpki-roots
]
confidence-threshold = 0.93
# Crates with non-SPDX or hand-rolled license text — review and pin explicitly.
exceptions = [
    # { allow = ["MIT"], name = "some-crate", version = "*" },
]

[bans]
# Today: 30+ transitive duplicates (zbus v3/v5 from Tauri stack, async-* across
# the workspace, …). Tightening to "warn" without `skip`-listing each one would
# spam every PR. Start at "allow" so the gate lands; tighten after a sweep.
# Tracked in docs/security/threat-model.md (Phase 3 follow-up).
multiple-versions = "allow"
# Intent: catch literal `version = "*"` in dependencies. cargo-deny also flags
# intra-workspace path deps and rev-pinned git deps as wildcards because the
# workspace member crates aren't marked `publish = false`. That's a separate
# cleanup; for now `warn` records the signal without blocking. Tighten to
# `deny` after marking application crates as non-publishable.
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
# Crates we will not ship.
deny = [
    # Examples — fill in as we find issues:
    # { name = "openssl", reason = "use rustls-tls; openssl pulls system libs and complicates cross-compile" },
]
# Skip multiple-version checks for crates known to legitimately appear at multiple versions
# (typically because two of our deps disagree on a major). Document the reason.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # mistral.rs fork pinned to a TuringWorks branch with quant/Metal patches
    # for the TurboQuant work. The rev is pinned in Cargo.toml.
    "https://github.com/TuringWorks/mistral.rs",
]
