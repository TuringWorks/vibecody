name: VibeCodyWatch
options:
  deploymentTarget:
    watchOS: "10.0"
  bundleIdPrefix: com.turingworks.vibecody

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "4"   # Apple Watch
    SUPPORTS_MACCATALYST: NO

targets:
  VibeCodyWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: "VibeCodyWatch Watch App"
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.turingworks.vibecody.watch
        INFOPLIST_FILE: "VibeCodyWatch Watch App/Info.plist"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: WatchKit.framework
      - sdk: CryptoKit.framework
      - target: VibeCodyWatchComplication
        embed: true
    info:
      path: "VibeCodyWatch Watch App/Info.plist"
      properties:
        CFBundleName: VibeCody
        CFBundleDisplayName: VibeCody
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UISupportedInterfaceOrientations: []
        WKWatchOnly: YES
        WKApplication: YES
        NSFaceIDUsageDescription: "Used for secure authentication"
        NSMicrophoneUsageDescription: "Used for voice commands to VibeCody"
        NSSpeechRecognitionUsageDescription: "Used to dictate commands to VibeCody"

  # W1.2 — WidgetKit Smart Stack tile + complication for the latest
  # background-agent job recap. The widget extension is bundled into
  # the watch app via the `embed: true` dependency above; iOS treats
  # bundled widget extensions as both Smart Stack candidates and
  # complication families on watchOS 10+.
  VibeCodyWatchComplication:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: "VibeCodyWatchComplication"
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.turingworks.vibecody.watch.complication
        INFOPLIST_FILE: "VibeCodyWatchComplication/Info.plist"
        SWIFT_EMIT_LOC_STRINGS: YES
        SKIP_INSTALL: YES
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: "VibeCodyWatchComplication/Info.plist"
      properties:
        CFBundleName: VibeCody
        CFBundleDisplayName: Job Recap
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
