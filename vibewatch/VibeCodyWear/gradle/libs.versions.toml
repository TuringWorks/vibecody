[versions]
agp = "9.2.1"
kotlin = "2.1.0"
compileSdk = "36"
minSdk = "30"

# AndroidX
activityCompose = "1.9.3"
lifecycleRuntimeCompose = "2.8.7"

# Wear OS Compose
wearCompose = "1.6.2"
wearTiles = "1.6.0"

# Play Services Wearable
playServicesWearable = "18.2.0"

# OkHttp
okhttp = "5.4.0"

# Moshi
moshi = "1.15.1"

# Coroutines
coroutinesPlayServices = "1.8.1"

# Security crypto
securityCrypto = "1.1.0"

# Tiles support — async + preview
guava = "33.6.0-android"
concurrentFutures = "1.2.0"
composeUiToolingPreview = "1.7.6"

[libraries]
# Activity
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }

# Lifecycle
androidx-lifecycle-runtime-compose = { group = "androidx.lifecycle", name = "lifecycle-runtime-compose", version.ref = "lifecycleRuntimeCompose" }
androidx-lifecycle-viewmodel-compose = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-compose", version.ref = "lifecycleRuntimeCompose" }

# Wear OS Compose
androidx-wear-compose-material = { group = "androidx.wear.compose", name = "compose-material", version.ref = "wearCompose" }
androidx-wear-compose-foundation = { group = "androidx.wear.compose", name = "compose-foundation", version.ref = "wearCompose" }
androidx-wear-compose-navigation = { group = "androidx.wear.compose", name = "compose-navigation", version.ref = "wearCompose" }

# Wear OS Tiles
androidx-wear-tiles = { group = "androidx.wear.tiles", name = "tiles", version.ref = "wearTiles" }
androidx-wear-tiles-material = { group = "androidx.wear.tiles", name = "tiles-material", version.ref = "wearTiles" }

# Play Services Wearable
play-services-wearable = { group = "com.google.android.gms", name = "play-services-wearable", version.ref = "playServicesWearable" }

# OkHttp
okhttp = { group = "com.squareup.okhttp3", name = "okhttp", version.ref = "okhttp" }
okhttp-sse = { group = "com.squareup.okhttp3", name = "okhttp-sse", version.ref = "okhttp" }

# Moshi
moshi-kotlin = { group = "com.squareup.moshi", name = "moshi-kotlin", version.ref = "moshi" }

# Coroutines
kotlinx-coroutines-play-services = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-play-services", version.ref = "coroutinesPlayServices" }

# Security
androidx-security-crypto = { group = "androidx.security", name = "security-crypto", version.ref = "securityCrypto" }

# Tile services — Futures + Preview annotation
guava = { group = "com.google.guava", name = "guava", version.ref = "guava" }
androidx-concurrent-futures = { group = "androidx.concurrent", name = "concurrent-futures", version.ref = "concurrentFutures" }
androidx-compose-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview", version.ref = "composeUiToolingPreview" }

# Speech (on-device; maps to SpeechRecognizer system API — no extra dep needed)
# Alias kept for build.gradle.kts reference; actual dep not needed
androidx-speech-recognizer = { group = "androidx.wear", name = "wear", version = "1.4.0" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
