<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350">
  <defs>
    <style>
      text { font-family: 'Inter', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="350" fill="#0d1117" rx="6"/>

  <!-- Title -->
  <text x="500" y="32" fill="#e6edf3" font-size="20" font-weight="700" text-anchor="middle">Setup Complexity Comparison</text>

  <!-- Axis labels -->
  <text x="155" y="56" fill="#8b949e" font-size="11" text-anchor="end">Product</text>
  <text x="580" y="56" fill="#8b949e" font-size="11" text-anchor="middle">Time to First Run</text>

  <!-- Grid lines (time markers) -->
  <line x1="165" y1="62" x2="165" y2="330" stroke="#21262d" stroke-width="1"/>
  <line x1="345" y1="62" x2="345" y2="330" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="345" y="340" fill="#484f58" font-size="10" text-anchor="middle">5 min</text>
  <line x1="525" y1="62" x2="525" y2="330" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="525" y="340" fill="#484f58" font-size="10" text-anchor="middle">15 min</text>
  <line x1="705" y1="62" x2="705" y2="330" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="705" y="340" fill="#484f58" font-size="10" text-anchor="middle">25 min</text>
  <line x1="885" y1="62" x2="885" y2="330" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="885" y="340" fill="#484f58" font-size="10" text-anchor="middle">40 min</text>

  <!-- Row 1: VibeCody - 2 min -->
  <text x="155" y="86" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">VibeCody</text>
  <rect x="165" y="72" width="72" height="24" rx="6" fill="#27ae60"/>
  <text x="248" y="88" fill="#7ee8a0" font-size="11" font-weight="600">2 min</text>
  <text x="295" y="88" fill="#8b949e" font-size="10">curl | bash</text>
  <rect x="380" y="74" width="110" height="20" rx="10" fill="#21262d" stroke="#27ae60" stroke-width="1"/>
  <text x="435" y="88" fill="#7ee8a0" font-size="10" text-anchor="middle">No Docker needed</text>

  <!-- Row 2: Claude Code - 3 min -->
  <text x="155" y="120" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">Claude Code</text>
  <rect x="165" y="106" width="108" height="24" rx="6" fill="#27ae60"/>
  <text x="284" y="122" fill="#7ee8a0" font-size="11" font-weight="600">3 min</text>
  <text x="331" y="122" fill="#8b949e" font-size="10">npm install</text>

  <!-- Row 3: Jan.ai - 5 min -->
  <text x="155" y="154" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">Jan.ai</text>
  <rect x="165" y="140" width="180" height="24" rx="6" fill="#f39c12"/>
  <text x="356" y="156" fill="#f5cf8a" font-size="11" font-weight="600">5 min</text>
  <text x="403" y="156" fill="#8b949e" font-size="10">Download app</text>

  <!-- Row 4: n8n - 5 min -->
  <text x="155" y="188" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">n8n</text>
  <rect x="165" y="174" width="180" height="24" rx="6" fill="#f39c12"/>
  <text x="356" y="190" fill="#f5cf8a" font-size="11" font-weight="600">5 min</text>
  <text x="403" y="190" fill="#8b949e" font-size="10">npx n8n</text>

  <!-- Row 5: Goose - 5 min -->
  <text x="155" y="222" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">Goose</text>
  <rect x="165" y="208" width="180" height="24" rx="6" fill="#f39c12"/>
  <text x="356" y="224" fill="#f5cf8a" font-size="11" font-weight="600">5 min</text>
  <text x="403" y="224" fill="#8b949e" font-size="10">cargo install</text>

  <!-- Row 6: OpenClaw - 15-30 min -->
  <text x="155" y="256" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">OpenClaw</text>
  <rect x="165" y="242" width="540" height="24" rx="6" fill="#e74c3c"/>
  <text x="716" y="258" fill="#f5a0a0" font-size="11" font-weight="600">15-30 min</text>
  <text x="440" y="258" fill="#fff" font-size="10" text-anchor="middle">Clone  &#x2192;  npm install  &#x2192;  Docker pull  &#x2192;  Config  &#x2192;  Start</text>

  <!-- Row 7: PicoClaw - 10-20 min -->
  <text x="155" y="290" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">PicoClaw</text>
  <rect x="165" y="276" width="396" height="24" rx="6" fill="#e74c3c"/>
  <text x="572" y="292" fill="#f5a0a0" font-size="11" font-weight="600">10-20 min</text>
  <text x="365" y="292" fill="#fff" font-size="10" text-anchor="middle">Clone  &#x2192;  npm install  &#x2192;  Docker pull  &#x2192;  Config  &#x2192;  Start</text>

  <!-- Row 8: NemoClaw - 20-40 min -->
  <text x="155" y="324" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">NemoClaw</text>
  <rect x="165" y="310" width="720" height="24" rx="6" fill="#e74c3c"/>
  <text x="895" y="326" fill="#f5a0a0" font-size="11" font-weight="600">20-40 min</text>
  <text x="525" y="326" fill="#fff" font-size="10" text-anchor="middle">Clone  &#x2192;  npm install  &#x2192;  Docker  &#x2192;  NVIDIA drivers  &#x2192;  CUDA  &#x2192;  Config</text>
</svg>