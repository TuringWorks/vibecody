<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Inter, sans-serif">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4a9eff" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e0e0e0" font-size="22" font-weight="700">OpenClaw Architecture</text>

  <!-- ===== TOP ROW: Access Layer ===== -->
  <text x="40" y="75" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1.5">ACCESS LAYER</text>

  <!-- Web UI -->
  <rect x="60" y="88" width="200" height="56" rx="6" fill="#12243d" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="160" y="113" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Web UI</text>
  <text x="160" y="131" text-anchor="middle" fill="#8b949e" font-size="11">React frontend</text>

  <!-- Terminal CLI -->
  <rect x="300" y="88" width="200" height="56" rx="6" fill="#12243d" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="400" y="113" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Terminal CLI</text>
  <text x="400" y="131" text-anchor="middle" fill="#8b949e" font-size="11">Command-line interface</text>

  <!-- Warning badge: Single User Only -->
  <rect x="640" y="85" width="150" height="30" rx="4" fill="#2d0a0a" stroke="#e74c3c" stroke-width="1.5" filter="url(#glow)"/>
  <text x="715" y="105" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="700">Single User Only</text>

  <!-- ===== MIDDLE ROW: Core Layer ===== -->
  <text x="40" y="185" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1.5">CORE LAYER</text>

  <!-- Agent Loop -->
  <rect x="30" y="198" width="185" height="70" rx="6" fill="#12243d" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="122" y="226" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Agent Loop</text>
  <text x="122" y="244" text-anchor="middle" fill="#8b949e" font-size="11">ReAct pattern</text>
  <text x="122" y="258" text-anchor="middle" fill="#8b949e" font-size="10">Think -> Act -> Observe</text>

  <!-- CVE badge near Agent Loop -->
  <rect x="28" y="270" width="140" height="24" rx="4" fill="#2d0a0a" stroke="#e74c3c" stroke-width="1.5" filter="url(#glow)"/>
  <text x="98" y="286" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="700">CVE-2026-25253</text>

  <!-- Computer Use -->
  <rect x="235" y="198" width="185" height="70" rx="6" fill="#12243d" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="327" y="226" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Computer Use</text>
  <text x="327" y="244" text-anchor="middle" fill="#8b949e" font-size="11">Screenshots + Click</text>
  <text x="327" y="258" text-anchor="middle" fill="#8b949e" font-size="10">Screen control agent</text>

  <!-- Browser -->
  <rect x="440" y="198" width="185" height="70" rx="6" fill="#12243d" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="532" y="226" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Browser</text>
  <text x="532" y="244" text-anchor="middle" fill="#8b949e" font-size="11">Chromium instance</text>
  <text x="532" y="258" text-anchor="middle" fill="#8b949e" font-size="10">Headless / headed</text>

  <!-- Tool System -->
  <rect x="645" y="198" width="185" height="70" rx="6" fill="#12243d" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="737" y="226" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Tool System</text>
  <text x="737" y="244" text-anchor="middle" fill="#8b949e" font-size="11">Python-based tools</text>
  <text x="737" y="258" text-anchor="middle" fill="#8b949e" font-size="10">File, shell, code exec</text>

  <!-- ===== BOTTOM ROW: Infrastructure ===== -->
  <text x="40" y="340" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1.5">INFRASTRUCTURE</text>

  <!-- Docker Container (red border = REQUIRED) -->
  <rect x="30" y="355" width="260" height="80" rx="6" fill="#1a1a2d" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="160" y="383" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Docker Container</text>
  <text x="160" y="401" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="600">REQUIRED</text>
  <text x="160" y="418" text-anchor="middle" fill="#8b949e" font-size="10">Isolation boundary for all execution</text>

  <!-- Docker Required badge -->
  <rect x="30" y="438" width="130" height="24" rx="4" fill="#2d0a0a" stroke="#e74c3c" stroke-width="1.5" filter="url(#glow)"/>
  <text x="95" y="454" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="700">Docker Required</text>

  <!-- Config Store -->
  <rect x="320" y="355" width="240" height="80" rx="6" fill="#1a1a2d" stroke="#666" stroke-width="1.5"/>
  <text x="440" y="383" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Config Store</text>
  <text x="440" y="401" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="600">plaintext creds</text>
  <text x="440" y="418" text-anchor="middle" fill="#8b949e" font-size="10">API keys, settings, state</text>

  <!-- File System -->
  <rect x="590" y="355" width="240" height="80" rx="6" fill="#1a1a2d" stroke="#666" stroke-width="1.5"/>
  <text x="710" y="383" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">File System</text>
  <text x="710" y="401" text-anchor="middle" fill="#8b949e" font-size="11">Container-mounted</text>
  <text x="710" y="418" text-anchor="middle" fill="#8b949e" font-size="10">Workspace volume bind</text>

  <!-- ClawHavoc badge -->
  <rect x="700" y="438" width="130" height="24" rx="4" fill="#2d0a0a" stroke="#e74c3c" stroke-width="1.5" filter="url(#glow)"/>
  <text x="765" y="454" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="700">ClawHavoc</text>

  <!-- ===== Connection lines ===== -->
  <!-- Access -> Core -->
  <line x1="160" y1="144" x2="122" y2="198" stroke="#4a9eff" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="160" y1="144" x2="327" y2="198" stroke="#4a9eff" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="400" y1="144" x2="327" y2="198" stroke="#4a9eff" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="400" y1="144" x2="532" y2="198" stroke="#4a9eff" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- Core internal connections -->
  <line x1="215" y1="233" x2="235" y2="233" stroke="#4a9eff" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="420" y1="233" x2="440" y2="233" stroke="#4a9eff" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="625" y1="233" x2="645" y2="233" stroke="#4a9eff" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Core -> Infrastructure -->
  <line x1="122" y1="268" x2="160" y2="355" stroke="#4a9eff" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="327" y1="268" x2="440" y2="355" stroke="#4a9eff" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="532" y1="268" x2="440" y2="355" stroke="#4a9eff" stroke-width="1" opacity="0.3" marker-end="url(#arrow)"/>
  <line x1="737" y1="268" x2="710" y2="355" stroke="#4a9eff" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- Infrastructure internal connections -->
  <line x1="290" y1="395" x2="320" y2="395" stroke="#666" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="560" y1="395" x2="590" y2="395" stroke="#666" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- ===== Layer labels (right side) ===== -->
  <rect x="830" y="95" width="4" height="42" rx="2" fill="#4a9eff" opacity="0.5"/>
  <rect x="830" y="205" width="4" height="56" rx="2" fill="#4a9eff" opacity="0.5"/>
  <rect x="830" y="362" width="4" height="66" rx="2" fill="#666" opacity="0.5"/>

  <!-- ===== Stats footer ===== -->
  <line x1="40" y1="520" x2="860" y2="520" stroke="#333" stroke-width="1"/>
  <text x="450" y="545" text-anchor="middle" fill="#8b949e" font-size="12">~200K LOC TypeScript  |  Docker required  |  Single-user  |  Apache 2</text>

  <!-- Subtle border -->
  <rect x="1" y="1" width="898" height="598" rx="8" fill="none" stroke="#21262d" stroke-width="1.5"/>
</svg>
