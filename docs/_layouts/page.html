---
layout: default
---
<div class="page-header">
  {% if page.parent %}
  <div class="breadcrumb">{{ page.parent }}</div>
  {% endif %}
  <h1 class="page-title">{{ page.title }}</h1>
  {% if page.description %}
  <p class="page-description">{{ page.description }}</p>
  {% endif %}
</div>

<div class="page-content">
  {{ content }}
</div>
