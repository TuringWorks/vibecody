title: VibeCody
description: AI-powered developer toolchain — VibeCLI terminal assistant + VibeUI desktop editor
baseurl: ""
url: ""

theme: minima

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: "2..3"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Sidebar navigation (grouped with collapsible sections)
sidebar:
  - title: Overview
    icon: home
    url: /
  - title: Quickstart
    icon: zap
    url: /quickstart/
  - title: Tutorials
    icon: book
    children:
      - title: Overview
        url: /tutorials/
      - title: First Provider
        url: /tutorials/first-provider/
      - title: Code Review
        url: /tutorials/code-review/
      - title: Agent Workflow
        url: /tutorials/agent-workflow/
      - title: Project Init
        url: /tutorials/project-init/
      - title: Channel Daemon
        url: /tutorials/channel-daemon/
      - title: Model Wizard
        url: /tutorials/model-wizard/
  - title: VibeCLI
    icon: terminal
    url: /vibecli/
  - title: VibeUI
    icon: layout
    url: /vibeui/
  - title: VibeMobile
    icon: smartphone
    url: /vibemobile/
  - title: Providers
    icon: cloud
    children:
      - title: Overview
        url: /providers/
      - title: Ollama
        url: /providers/ollama/
      - title: Claude
        url: /providers/claude/
      - title: OpenAI
        url: /providers/openai/
      - title: Gemini
        url: /providers/gemini/
      - title: DeepSeek
        url: /providers/deepseek/
  - title: Configuration
    icon: settings
    url: /configuration/
  - title: API Reference
    icon: code
    url: /api-reference/
  - title: Architecture
    icon: layers
    url: /architecture/
  - title: Plugin Development
    icon: puzzle
    url: /plugin-development/
  - title: Security
    icon: shield
    url: /security/
  - title: Demos
    icon: play
    children:
      - title: Overview
        url: /demos/
  - title: FAQ
    icon: help
    url: /faq/
  - title: Troubleshooting
    icon: tool
    url: /troubleshooting/
  - title: Glossary
    icon: book-open
    url: /glossary/
  - title: Release Notes
    icon: tag
    url: /release/

# Top tabs (like OpenRouter's Docs / API Reference / SDK Reference)
top_tabs:
  - title: Docs
    url: /
    active: true
  - title: API Reference
    url: /api-reference/
  - title: Release Notes
    url: /release/
  - title: Changelog
    url: /changelog/

header_pages:
  - index.md
  - quickstart.md
  - tutorials/index.md
  - vibecli.md
  - vibeui.md
  - vibemobile.md
  - providers/index.md
  - configuration.md
  - api-reference.md
  - architecture.md
  - PLUGIN-DEVELOPMENT.md
  - security.md
  - faq.md
  - troubleshooting.md
  - glossary.md
  - CHANGELOG.md
  - ROADMAP-v5.md
  - FIT-GAP-ANALYSIS-v7.md
  - contributing.md
  - demos/index.md

include:
  - llms.txt
  - llms-full.txt

minima:
  skin: dark
  social_links:
    github: TuringWorks/vibecody
