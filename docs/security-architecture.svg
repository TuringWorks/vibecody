<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow-white" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c9d1d9"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e74c3c"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="#0d1117" rx="0"/>

  <!-- Title -->
  <text x="400" y="38" fill="#e6edf3" font-size="22" font-weight="700">VibeCody Defense-in-Depth Security Model</text>
  <text x="400" y="58" fill="#8b949e" font-size="12">Concentric layers protect your code and data from external threats</text>

  <!-- ========== CONCENTRIC RINGS (centered at 400, 400) ========== -->

  <!-- Layer 1 (outermost) - Approval Policies - Blue -->
  <ellipse cx="400" cy="410" rx="340" ry="280" fill="none" stroke="#3498db" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.7"/>
  <ellipse cx="400" cy="410" rx="340" ry="280" fill="#3498db" opacity="0.04"/>
  <rect x="55" y="120" width="180" height="78" rx="6" fill="#0d1117" stroke="#3498db" stroke-width="1.5"/>
  <text x="145" y="140" fill="#3498db" font-size="11" font-weight="700" text-anchor="middle">LAYER 1: APPROVAL POLICIES</text>
  <text x="145" y="156" fill="#8b949e" font-size="9.5" text-anchor="middle">suggest: manual approval</text>
  <text x="145" y="169" fill="#8b949e" font-size="9.5" text-anchor="middle">auto-edit: files auto, cmds manual</text>
  <text x="145" y="182" fill="#8b949e" font-size="9.5" text-anchor="middle">full-auto: sandbox required</text>
  <line x1="235" y1="160" x2="270" y2="200" stroke="#3498db" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Layer 2 - Sandbox Isolation - Purple -->
  <ellipse cx="400" cy="410" rx="280" ry="230" fill="none" stroke="#9b59b6" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.7"/>
  <ellipse cx="400" cy="410" rx="280" ry="230" fill="#9b59b6" opacity="0.04"/>
  <rect x="570" y="128" width="195" height="85" rx="6" fill="#0d1117" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="667" y="148" fill="#9b59b6" font-size="11" font-weight="700" text-anchor="middle">LAYER 2: SANDBOX ISOLATION</text>
  <text x="667" y="164" fill="#8b949e" font-size="9.5" text-anchor="middle">Docker / Podman / OpenSandbox</text>
  <text x="667" y="177" fill="#8b949e" font-size="9.5" text-anchor="middle">Resource limits (CPU, mem, PIDs)</text>
  <text x="667" y="190" fill="#8b949e" font-size="9.5" text-anchor="middle">Network: none / restricted / full</text>
  <text x="667" y="203" fill="#8b949e" font-size="9.5" text-anchor="middle">Read-only volume mounts</text>
  <line x1="590" y1="200" x2="540" y2="240" stroke="#9b59b6" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Layer 3 - Input Validation - Orange -->
  <ellipse cx="400" cy="410" rx="220" ry="180" fill="none" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.7"/>
  <ellipse cx="400" cy="410" rx="220" ry="180" fill="#e67e22" opacity="0.04"/>
  <rect x="55" y="240" width="200" height="85" rx="6" fill="#0d1117" stroke="#e67e22" stroke-width="1.5"/>
  <text x="155" y="260" fill="#e67e22" font-size="11" font-weight="700" text-anchor="middle">LAYER 3: INPUT VALIDATION</text>
  <text x="155" y="276" fill="#8b949e" font-size="9.5" text-anchor="middle">Path traversal prevention (no ../)</text>
  <text x="155" y="289" fill="#8b949e" font-size="9.5" text-anchor="middle">SSRF URL scheme validation</text>
  <text x="155" y="302" fill="#8b949e" font-size="9.5" text-anchor="middle">Command blocklist (rm -rf, mkfs..)</text>
  <text x="155" y="315" fill="#8b949e" font-size="9.5" text-anchor="middle">Tool argument sanitization</text>
  <line x1="255" y1="290" x2="290" y2="320" stroke="#e67e22" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Layer 4 - Rate Limiting - Yellow -->
  <ellipse cx="400" cy="410" rx="160" ry="130" fill="none" stroke="#f39c12" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.7"/>
  <ellipse cx="400" cy="410" rx="160" ry="130" fill="#f39c12" opacity="0.04"/>
  <rect x="590" y="270" width="195" height="72" rx="6" fill="#0d1117" stroke="#f39c12" stroke-width="1.5"/>
  <text x="687" y="290" fill="#f39c12" font-size="11" font-weight="700" text-anchor="middle">LAYER 4: RATE LIMITING</text>
  <text x="687" y="306" fill="#8b949e" font-size="9.5" text-anchor="middle">Per-provider API call limits</text>
  <text x="687" y="319" fill="#8b949e" font-size="9.5" text-anchor="middle">Token budget enforcement</text>
  <text x="687" y="332" fill="#8b949e" font-size="9.5" text-anchor="middle">Concurrent request caps</text>
  <line x1="610" y1="320" x2="560" y2="360" stroke="#f39c12" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Layer 5 - Audit Trail - Green -->
  <ellipse cx="400" cy="410" rx="105" ry="85" fill="none" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.7"/>
  <ellipse cx="400" cy="410" rx="105" ry="85" fill="#27ae60" opacity="0.04"/>
  <rect x="55" y="390" width="195" height="85" rx="6" fill="#0d1117" stroke="#27ae60" stroke-width="1.5"/>
  <text x="152" y="410" fill="#27ae60" font-size="11" font-weight="700" text-anchor="middle">LAYER 5: AUDIT TRAIL</text>
  <text x="152" y="426" fill="#8b949e" font-size="9.5" text-anchor="middle">JSONL trace logs per session</text>
  <text x="152" y="439" fill="#8b949e" font-size="9.5" text-anchor="middle">Tool call recording (args+results)</text>
  <text x="152" y="452" fill="#8b949e" font-size="9.5" text-anchor="middle">PII redaction option</text>
  <text x="152" y="465" fill="#8b949e" font-size="9.5" text-anchor="middle">Compliance controls (SOC 2)</text>
  <line x1="250" y1="430" x2="296" y2="420" stroke="#27ae60" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Layer 6 (innermost) - Admin Policies - Red -->
  <ellipse cx="400" cy="410" rx="58" ry="47" fill="none" stroke="#e74c3c" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="400" cy="410" rx="58" ry="47" fill="#e74c3c" opacity="0.06"/>
  <rect x="590" y="395" width="195" height="72" rx="6" fill="#0d1117" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="687" y="415" fill="#e74c3c" font-size="11" font-weight="700" text-anchor="middle">LAYER 6: ADMIN POLICIES</text>
  <text x="687" y="431" fill="#8b949e" font-size="9.5" text-anchor="middle">RBAC role enforcement</text>
  <text x="687" y="444" fill="#8b949e" font-size="9.5" text-anchor="middle">Organization-level restrictions</text>
  <text x="687" y="457" fill="#8b949e" font-size="9.5" text-anchor="middle">Key rotation requirements</text>
  <line x1="610" y1="430" x2="458" y2="420" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Center: Protected Asset -->
  <rect x="365" y="393" width="70" height="34" rx="5" fill="#161b22" stroke="#e6edf3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="406" fill="#e6edf3" font-size="9" font-weight="700" text-anchor="middle">Your Code</text>
  <text x="400" y="419" fill="#e6edf3" font-size="9" font-weight="700" text-anchor="middle">&amp; Data</text>

  <!-- ========== RIGHT SIDE: VERTICAL THREAT FLOW ========== -->

  <!-- Flow header -->
  <text x="930" y="80" fill="#e6edf3" font-size="14" font-weight="700" text-anchor="middle">Threat Flow</text>

  <!-- External Request -->
  <rect x="870" y="95" width="120" height="30" rx="5" fill="#21262d" stroke="#484f58" stroke-width="1"/>
  <text x="930" y="115" fill="#c9d1d9" font-size="10" font-weight="600" text-anchor="middle">External Request</text>

  <!-- Flow arrow down -->
  <line x1="930" y1="125" x2="930" y2="145" stroke="#c9d1d9" stroke-width="1.5" marker-end="url(#arrow-white)"/>

  <!-- Layer 1 box -->
  <rect x="883" y="148" width="94" height="24" rx="4" fill="#0d1117" stroke="#3498db" stroke-width="1.5"/>
  <text x="930" y="164" fill="#3498db" font-size="9" font-weight="600" text-anchor="middle">Approval</text>
  <!-- BLOCKED arrow -->
  <line x1="883" y1="160" x2="850" y2="160" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="835" y="155" fill="#e74c3c" font-size="7" font-weight="700" text-anchor="middle">BLOCKED</text>

  <line x1="930" y1="172" x2="930" y2="192" stroke="#c9d1d9" stroke-width="1.5" marker-end="url(#arrow-white)"/>

  <!-- Layer 2 box -->
  <rect x="883" y="195" width="94" height="24" rx="4" fill="#0d1117" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="930" y="211" fill="#9b59b6" font-size="9" font-weight="600" text-anchor="middle">Sandbox</text>
  <line x1="883" y1="207" x2="850" y2="207" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="835" y="202" fill="#e74c3c" font-size="7" font-weight="700" text-anchor="middle">BLOCKED</text>

  <line x1="930" y1="219" x2="930" y2="239" stroke="#c9d1d9" stroke-width="1.5" marker-end="url(#arrow-white)"/>

  <!-- Layer 3 box -->
  <rect x="883" y="242" width="94" height="24" rx="4" fill="#0d1117" stroke="#e67e22" stroke-width="1.5"/>
  <text x="930" y="258" fill="#e67e22" font-size="9" font-weight="600" text-anchor="middle">Validation</text>
  <line x1="883" y1="254" x2="850" y2="254" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="835" y="249" fill="#e74c3c" font-size="7" font-weight="700" text-anchor="middle">BLOCKED</text>

  <line x1="930" y1="266" x2="930" y2="286" stroke="#c9d1d9" stroke-width="1.5" marker-end="url(#arrow-white)"/>

  <!-- Layer 4 box -->
  <rect x="883" y="289" width="94" height="24" rx="4" fill="#0d1117" stroke="#f39c12" stroke-width="1.5"/>
  <text x="930" y="305" fill="#f39c12" font-size="9" font-weight="600" text-anchor="middle">Rate Limit</text>
  <line x1="883" y1="301" x2="850" y2="301" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="835" y="296" fill="#e74c3c" font-size="7" font-weight="700" text-anchor="middle">BLOCKED</text>

  <line x1="930" y1="313" x2="930" y2="333" stroke="#c9d1d9" stroke-width="1.5" marker-end="url(#arrow-white)"/>

  <!-- Layer 5 box -->
  <rect x="883" y="336" width="94" height="24" rx="4" fill="#0d1117" stroke="#27ae60" stroke-width="1.5"/>
  <text x="930" y="352" fill="#27ae60" font-size="9" font-weight="600" text-anchor="middle">Audit</text>
  <line x1="883" y1="348" x2="850" y2="348" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="835" y="343" fill="#e74c3c" font-size="7" font-weight="700" text-anchor="middle">BLOCKED</text>

  <line x1="930" y1="360" x2="930" y2="380" stroke="#c9d1d9" stroke-width="1.5" marker-end="url(#arrow-white)"/>

  <!-- Layer 6 box -->
  <rect x="883" y="383" width="94" height="24" rx="4" fill="#0d1117" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="930" y="399" fill="#e74c3c" font-size="9" font-weight="600" text-anchor="middle">Admin</text>
  <line x1="883" y1="395" x2="850" y2="395" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="835" y="390" fill="#e74c3c" font-size="7" font-weight="700" text-anchor="middle">BLOCKED</text>

  <line x1="930" y1="407" x2="930" y2="427" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-white)"/>

  <!-- Safe access -->
  <rect x="870" y="430" width="120" height="30" rx="5" fill="#161b22" stroke="#27ae60" stroke-width="1.5"/>
  <text x="930" y="449" fill="#27ae60" font-size="10" font-weight="600" text-anchor="middle">Code &amp; Data</text>

  <!-- Legend / Shield icon at bottom -->
  <text x="400" y="720" fill="#484f58" font-size="10" text-anchor="middle">Each layer independently blocks unauthorized or malicious actions</text>
  <text x="400" y="736" fill="#484f58" font-size="10" text-anchor="middle">Threats must pass ALL layers to reach protected assets</text>

  <!-- Small shield icon -->
  <g transform="translate(920, 450)">
    <text x="10" y="22" fill="#484f58" font-size="9" text-anchor="middle">6 layers</text>
    <text x="10" y="34" fill="#484f58" font-size="9" text-anchor="middle">deep</text>
  </g>

</svg>
